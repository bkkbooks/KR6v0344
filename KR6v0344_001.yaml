body:
  text: 月稱論師造頌法尊法師譯講隆蓮比丘尼筆記前言教乘所攝欲釋論文先明本論教乘所攝釋尊證覺初對小乘初機轉四諦法輪次對大乘上根菩薩說般若轉無相法輪次對一類較鈍之機說解深密等經轉善辨法輪此論於三轉法輪中是第二轉無相法輪所攝佛滅度後佛法之弘揚初期為阿難迦葉優波離結集小乘三藏次馬鳴龍樹提婆弘大乘般若之教多說空義次無著菩薩弘揚唯識近於有宗在佛法流傳之三期中此論是第二期龍樹之教所攝又印度當時佛法之部別略分為四一薩婆多部依俱舍婆沙稱為有宗二較有宗稍進步之經部此二部屬小乘於大乘中亦分為二一為唯識宗說離識之外境無內心實有立三性三無性謂遍計無自性依他圓成有自性二為空宗亦曰中觀宗說一切法皆無自性此論於四部中是最後中觀宗所攝學龍樹教之弟子見解又稍有出入龍樹第一大弟子提婆後人尊之同於龍樹其見與龍樹無異次佛護論師出廣釋龍樹密意又其後有清辨論師著掌珍論般若燈論評佛護之失中觀遂成二派再後月稱論師出復評清辨之失而申佛護之論於此二派之外復有靜命論師調和中觀唯識而取折衷之見謂世俗諦無外境有內心勝義諦內心亦無自性月稱論師一派稱為應成派餘二派合稱自續派清辨稱順經部行靜命稱順瑜伽行本論於中觀三派中為應成派之要籍造論人介紹本論作者月稱約公元六約六五論師為印度那爛陀寺堪布當時弘中觀正見諸部諍難蜂起皆為師所折服其智慧辨才固不待言矣有難師者云若諸法緣生如幻無實體而有作用寺壁所畫母牛應能出乳師應時令壁畫母牛有乳流出難者折服其證悟法性之力又如此其造斯論由大悲心為利衆生遠離我慢抉擇中論發揚龍樹正見復造有六十正理論注等傳稱宗喀巴大師初於龍樹中觀之見未盡通達欲往印度求之乃往洛卡就虛空幢大師決行止虛空幢大師乃修金剛手菩薩成就者金剛手菩薩謂宗喀巴大師言若往印度能作大菩提寺堪布但諸弟子皆加行位菩薩不堪印度酷熱恐多死亡殊為可惜若在藏地自可尋得中觀正見以月稱論師乃上方世界補處菩薩發願來此世界弘揚中觀正見必來攝受云云宗喀巴大師依此修習即於洛卡證得中觀正見故月稱論師為黃教所宗此外薩迦嘎舉等派亦莫不各自認為月稱見在藏地言之可謂定於一尊矣內地中觀著述於月稱佛護注疏均尚無譯本雖有青目中論注其文甚略般若燈論尤艱澀難入其基本之著作中論二十七品抉擇二無我文字或甚簡或甚繁以簡故簡別之語時有省略易令後人誤解墮於斷滅之空以繁故有時反不易得其真義月稱論師作顯句論隨文注釋中論有詳細抉擇復造斯論攝中觀論修行次第為入於中論之門徑茲論初經譯出全文甚廣今但就頌文略釋大要而已本論之組織入中論之組織依於華嚴經十地品龍樹菩薩著有十住毗婆沙論以釋經此土所譯只有前二地之文空宗著述多釋般若深見釋般若廣行甚少龍樹菩薩所造只有集經論法界讚寶鬘論指示修行次第不但談空本論於空宗正見及修行次第甚深廣大二種教門均有解釋自初地乃至佛地依次排列每一地中敘菩薩修行成就之功德已復配以初發心修行法指學者以修行次第二空之理則在般若度中廣釋云何學中論學般若者應具清淨信心則雖聞四句一偈亦有無量功德故應先培信心生信之法常觀三界輪回流轉不息無纖毫之樂可以貪著次觀衆生若知求出離發菩提心修菩薩行無上佛果亦終有成就之一日若醉生夢死作生死業則一期報盡隨業受生或往人天或墮惡趣自無主宰應及此未至臨命終時自有智慧能力自在將此生死大事作一解決勿待臨時手忙足亂一墮三塗欲求正法不可得矣次當思惟有暇圓滿人身難得佛法難聞五濁惡世聞大乘法尤為希有般若經云學般若者從生至生受用無盡生生得生有大般若之處得遇善知識為說般若法門具足一切學般若之增上緣自然喜近善士樂聞正法樂修菩薩行故今聞此法者應生希有心常觀三業是否順因果如佛法修五戒十善則不失人天福報至少獲得臨命終時無有憂悔更上者以此功德回向往生極樂兜率則為淨土勝因再上者生生常值佛法為大菩薩之所攝受最後必蒙佛授記成佛度生最上者若有大福德一切圓滿依金剛乘即身成佛是又殊勝中之殊勝者矣然末世福德圓滿之根器難得則以出離心菩提心如法修行甚深慧廣大行生生常為大菩薩所攝受乃至究竟成佛是聽入中論者應有之宗趣也若以如是心學中論則宗喀巴大師月稱論師之功德亦許後人修成也正釋頌文釋歸敬頌聲聞中佛能王生諸佛復從菩薩生大悲心與無二慧菩提心是佛子因初三頌半為論初歸敬歸敬大悲心亦即歸敬具大智之佛菩薩歸敬諸佛菩薩祖師求加被故又慢山高處無功德水歸敬折服慢心增功德故歸敬大悲心者自利利他功德之源從此出故聲聞者謂小乘人聞佛說法聲自證聖果又聞菩薩乘法但為他說令彼修行證果而自不修亦名聲聞中佛者辟支佛也稱中佛者為適於造頌之音節故佛謂覺悟真實辟支佛覺悟宇宙緣起之真實故亦稱佛中者下越聲聞上不逮佛故能王者佛也能謂能仁能斷煩惱出生死伏四魔度衆生故以聲聞等亦具此義故佛稱王別於聲聞等由佛轉四諦及十二因緣輪而後有聲聞緣覺故聲緣從佛生也菩薩值佛轉法輪而發心故菩薩亦從佛生但諸佛因地皆曾作菩薩故因位菩薩為佛親因諸佛初發菩提心皆由菩薩勸導如釋迦彌勒就是由文殊菩薩勸導而發菩提心的故菩薩為佛增上緣以此二義說諸佛從菩薩生菩薩復為三法所生謂大悲心無二慧及菩提心大悲心義下當釋茲當略釋無二慧及菩提心義無二慧者謂觀諸法性空無有實體不執為有而是因緣生亦非斷無如是觀諸法性空緣生如幻之慧與執諸法實有衆生有我之無明妄執為正對治為斷煩惱出生死之主力菩提心分二一者勝義菩提心謂初地以上通達性空同時發願利生二者世俗菩提心謂觀三界苦有如火宅數數思惟生決定解復觀衆生顛倒如病熱狂以苦為樂不知出離而此一切衆生皆我父母眷屬見其受茲無義劇苦欲為隨機設教令出苦海故願成佛為利衆生願成佛即菩提心有此心者即為菩薩悲性於佛廣大果初猶種子長如水常時受用若成熟故我先讚大悲心第二頌顯大悲心重要分三段初謂菩薩初發心時喻如種子菩提心為菩薩因大悲為菩提心因若無大悲唯求自了終不發心趣佛果故中謂修菩薩行時要經三大阿僧祇劫調伏無數剛強難調衆生難忍能忍難捨能捨長時苦行方成佛果若非大悲心之任持則菩提心有時退失喻如種子在田中若無日光水土必黴爛腐壞不能成長後謂成佛果時三身四智圓滿具足斷智二德究竟成就而不入涅槃應機說教任運度生盡未來際亦由大悲若無大悲應入涅槃不須辛勤作利生事喻如禾稼長成忽遇冰雹不能成熟或不得受用故大悲心初中後三時皆最重要為大乘佛法之中心讚者以語業敬禮也最初說我而執我次言我所則著法如水車轉無自在緣生興悲我敬禮此一頌半釋大悲心三種差別悲以拔苦為體遍一切衆生故曰大就所緣境差別分三謂生緣法緣無緣悲此頌釋生緣悲也生緣悲者謂緣衆生而興之大悲也前三句明可悲所由謂緣衆生初由我名遂起我執為生死大根本由執我故於苦樂境遂有取捨之欲而生貪瞋由執我故遂執有屬我之物起我所執我之衣食受用等攝取不捨追求無已於和合境則起貪不和合境則起瞋由貪瞋癡諸惑隨起造業受苦流轉生死於生死中升沉無主衰老病死如四大山東西南北合圍而來逼迫有情無可幸免惑業苦三往復無已無明緣行乃至老死次第流轉喻如水車循環不息又水車降時易升時難喻如生死中墮惡道易生善趣難有情最初一念誤執我故流轉生死受無義苦緣彼無義受苦之衆生而興悲故稱生緣悲也衆生猶如動水月見其搖動與性空此二句釋法緣大悲及無緣大悲動水月者謂風來波起水中月影由水動故月影亦動衆生流轉三界本無實體唯因業風識浪而有此影像顯現實無衆生似有衆生喻如動水月影剎那搖動無止息故自性本空現似有故衆生流轉不息實無似有亦猶如是菩薩通達性空唯見因緣生滅無實衆生衆生不達於水中月覺為實月於影及水見為一物於無我中見有實我由此我執為根流轉生死菩薩見衆生受此無義之苦因而興悲是為法緣悲菩薩又觀衆生雖無實體而因不達性空故仍有生死流轉因果不無因此雖不見實有衆生而仍度生不倦是為無緣大悲或釋無緣為全空無所緣衆生若見全空何由起悲乎此意第六品當廣釋釋十地諸頌第一菩提心歡喜地佛子此心於衆生為度彼故隨悲轉由普賢願善回向安住極喜此名初此下論文第一品釋初歡喜地佛子謂初地菩薩大悲心無二慧菩提心具足一大阿僧祇劫修行圓滿經資糧加行二位而入見道位此心者謂證真見道通達一切法無自性之心問既見衆生性空則知歷劫修行求度衆生而實無衆生可度一阿僧祇劫虛作無量難行苦行當翻然自悔如人夢墜水中力求出水以用力故霍然而醒則知向來墜水乃是夢境實無危險何必苦求出離菩薩見道以後得無退失利生之心耶答不爾菩薩雖見衆生性空而仍有生死流轉之衆生極可悲憫故於無實衆生可度中仍隨大悲心轉善巧度生剎那不息唯如是始不至墮入小乘涅槃或問地藏菩薩衆生度盡方證菩提若衆生無盡地藏應不成佛若地藏最後成佛衆生應有盡答衆生雖無盡地藏目中實已無衆生可度可謂衆生已盡是故見道後之菩薩證衆生性空若性空雖作無量難行苦行度生而不同地前之不得自在也若人不達自性非有緣起非無之理或執依他起必須實有或執一切皆空乃至父母亦無此非中觀見也大般若處處語空無所有不可得反覆重言之乃至六百卷之多似唯空為究竟然在彌勒菩薩視之則為說三智四加行五道一切修行次第之經故依之造現觀莊嚴論釋大般若修行次第也中觀論似偏重說空以當時之機於修行次第已無疑故是以論主唯重破執但說空理也不善學者遂墮偏空最上者亦僅成二乘之果不能成佛入中論糾正此弊故論初即揭櫫大悲第六品最後一頌以勝義世俗二菩提心喻如鵝王二翼缺一不可此乃是中道義亦即龍樹造中論佛說大般若之意故菩薩真見道後不以證空而遂入涅槃為成佛利生故復發無量大願此無量大願皆為普賢十大願攝盡故初地必須學普賢發願於時空慧已證行菩薩道之能力已得能捨一切頭目腦髓而無礙於布施度圓滿自在如盲得視如貧得寶未足為喻故名極喜此為初地從此由得彼心故唯以菩薩名稱說此下讚初地功德此二句讚菩薩名位決定彼心謂勝義菩提心地前雖有世俗菩提心仍是凡夫非真摩訶薩至此凡夫地障悉斷勝義福田自此為始成為大乘真正僧寶不可復以他名稱之唯可稱為菩薩菩提薩埵略翻菩薩菩提言覺悟薩埵言發心覺悟真實發心度生故曰菩薩發大乘心欲得菩提亦曰菩薩又薩埵言有情從初發心為利有情欲得菩提稱為菩薩教化有情使其覺悟亦稱菩薩此之菩薩約勝義菩提心言如大般若善勇猛菩薩問會說以慧通達諸法真理為菩薩也生於如來家族中斷除一切三種結此菩薩持勝歡喜亦能震動百世界初句讚生如來家功德成真佛子決不退轉究竟成佛故又所證與佛所證境近似故名生如來家次句讚斷德結謂煩惱如繩纏結繫縛有情不得解脫障出世間初地斷者有三種謂薩迦耶見疑戒禁取薩迦耶見即五惡見之首或譯有見或譯身見或譯壞聚見衆生於五蘊中執我亦譯我見而此五蘊色身乃衆多不淨聚積心亦剎那遷變不停念念集起本非是一衆生自少至老剎那變異一期命盡終歸壞滅亦非是常衆生於中見為一我日日無異而起我執佛為說壞破其執常說聚破其執一故翻壞聚其義為正若譯身見心義有闕若譯有見我義不顯欲存多義是故不翻衆生由我執染污於順生死流轉之法如蠅逐臭耽味無已聞無我理順解脫清淨之道反覺不合口味格格不入故欲求出離首當斷除薩迦耶見疑謂懷疑佛說法是否合於真理佛說三界皆苦是否失於悲觀消極佛說種種解脫之道是否有解脫可得縱有解脫佛於二千餘年前可得我今是否亦可得種種疑問所謂信為道源功德母長養一切諸善根今既懷疑不信不能由信起行則一切功德根本無由發生然世間農耕未必有收商賈未必獲利而世之營農商者如故並不懷疑廢捨蓋由農作獲實商賈致利其理易曉修行成佛因果之理微細難思故又現見農商有獲利者而末法之世無佛及大阿羅漢修行證果之事可現見故因此根本懷疑佛法不能趣行出離之道又有雖略能信三寶而無正知見於一法門無深忍真信由取巧心見異思遷今從一師學緑度母明遇一師復改學大白傘蓋終無一成此之二種或不趣出離或趣向不定皆為解脫之障戒禁取者謂不合佛法非佛所制之戒執為最勝能得出離禁者謂身語業決定之規則如執殺牲祀天則得生天或如婆羅門謂富者當施貧者盜亦不犯是皆不合佛戒者也又如持牛戒持狗戒外道見牛犬生天不明其多生福業因果遂以為食草不淨能得生天令弟子亦食草食不淨以為戒受無義苦又有以人身體之頭髮為贅物遂以拔髮為清淨或見仙鶴常踡一足後生天上遂以常翹一足教諸弟子此皆邪禁之類諸如是等非道謂道陷於歧途亦為解脫之障薩迦耶見能障解脫之欲樂疑障解脫行之發起戒禁取則令趣解脫者不能得正解脫道是皆出世間之障礙一切者攝諸微細煩惱震百世界者為初地菩薩神通亦為初地十二類功德之一如第六卷廣說從地登地善上進滅彼一切惡趣道此異生地悉永除如第八聖此亦爾諸地所證真空無有差別於勝義慧中安立為地菩薩從地至地如鳥飛空無有行迹故曰善上進也又由親證勝義始能善巧無誤失故名善上進然於勝義慧中諸地雖無差別而於世俗諦上建立諸地差別故由福德力之不同有所斷障礙所成功德與所圓滿波羅密之異否則禪宗破三關後已與諸佛同一鼻孔出氣何須再來搬柴運水乎滅彼一切惡趣道者彼謂地前加行位不墮惡趣唯伏惡趣因果要證初地惡趣因果方得永斷初地以後若為度生亦示入惡趣然由願力非業力也異生地即凡夫地不能得聖人之功德故名異生性在小乘俱舍中名為非得即未得聖人慧也此能障聖果證聖果時此即永除第八聖為小乘初果向之異名四果四向為八位此從阿羅漢果向下數在第八故亦稱八人地初果依四諦十六心見道謂苦法忍苦法智苦類忍苦類智乃至道類智之十六念心最後道類智之一念即證初果道類忍前十五念心即八人地此引為初地同法喻以大乘境界難知小乘易曉故也即住最初菩提心較佛語生及獨覺由福力勝極增長此三句顯超二乘功德最初菩提心謂初地最初勝義菩提心佛語生為聲聞異名獨覺者謂發解脫心以來百劫修行常值佛聞法深通四諦五蘊十二因緣十二處十八界處非處等法門由慢心故出無佛世最後生生上三姓不從佛聞法由宿善根力自能厭俗出家入山修行觀日月遷流草木代謝老死無常等事自能通達有情流轉無明為本斷惑證聖故曰獨覺又獨覺不樂羣居常獨來獨去又獨覺不喜喧雜故不為衆生說法唯為作福田或現神通令衆生培福信心增長即者謂即唯初發勝義菩提心之菩薩已勝二乘也聲聞利根者三生證果即鈍根者如有於釋迦佛世曾發心受持五戒十善至彌勒時亦定證聖果獨覺則百劫修行亦能證果唯大乘菩薩要經三大阿僧祇劫積集福德資糧本願未圓滿佛土未莊嚴衆生未成熟不能斷煩惱證佛果如人但求自身存活即乞丐亦不難謀一飽若欲成大事業利益多人富纍巨萬猶感貧乏是故福德懸殊也發世俗菩提心功德諸經亦多說勝於聲緣謂彼心緣盡法界衆生咸欲與樂拔苦一念中於一衆生邊成一福德資糧衆生無量一念中福德無量雖於睡眠放逸之時此善根亦繼續增長若三千大千世界衆生悉成輪王福德不如一聲聞悉成聲聞不如一獨覺悉成獨覺不如一初心菩薩此所以為勝也彼至遠行慧亦勝此句頌文是說菩薩至七地時不但以福德勝聲緣即以智慧之力亦勝聲緣七地名遠行地他宗自唯識以下皆言初地空慧即勝於二乘以二乘唯達人空不達法空故空宗則說三乘空慧平等華嚴經說乃至八地空慧亦同二乘而是無相無功用行七地則是無相有功用行於第七地般若波羅密多圓滿又蓋以方便波羅密多故於真如空性能剎那出入此則非二乘所能故曰初地以上福勝二乘至第七地時慧亦勝二乘也爾時施性最增勝為彼菩提第一因此下讚布施功德施性即布施波羅密多爾時通達性空割身肉以施衆生如截樹木無異故能圓滿布施而此布施乃成彼無上菩提佛果之第一因要福德資糧圓滿始能成就佛慧故要與衆生安樂始能攝受教化故自利利他皆由布施故為第一因雖施身肉仍殷重此因能比不現見由達空故雖施身肉亦無恐懼痛苦猶豫等事仍殷重愛樂行施以此樂施之相為因能比知其餘不可現見之功德如達空性斷三結等彼諸衆生皆求樂若無資具樂非有知受用具從施出故佛先說布施論此下示不唯菩薩應行布施二乘凡夫亦應行施也彼者指菩薩以外之人皆求樂者衆生多求五欲樂苦行外道受諸苦如尼乾子等亦為求作國王或生天享五欲樂也修離欲外道者為求禪定樂二乘為求寂靜樂乃至成佛亦為令衆生得無漏樂故不求樂之有情可謂無有此處所說樂偏重五欲樂資具即衣食四緣等在用貨幣之時代可以金錢釋之資具無缺乃先世福業之報在家孝父母敬師長出家承侍三寶乃感此果若無因而有果虛空應出麵包故貧者不可以劫盜而致富也賢愚因緣經百喻經等當參看佛知正因果故於六度之中先為菩薩說布施或謂出家之人未必能施然仍能持戒可見六度不必以布施為先然而凡持戒者第一念必先有不貪著心對於家及五欲境不貪始能持出家戒對於資具不貪始能非義不取如此等是也悲心下劣心粗獷專求自利為勝者彼等所求諸受用滅苦之因皆施生悲心下劣之二乘煩惱未調之粗獷衆生不顧他利唯以自利為第一義者其所求滅苦之因如滅饑寒苦之衣食等受用具亦皆施之果也此復由行布施時速得值遇真聖者於是永斷三有流當趣證於寂滅果聲聞緣覺要先聞佛說法為因始能斷三有生死之流而證聖果在家人要值遇聖者尤必以施為增上緣由以清淨信心供佛及僧故必感真聖者為作福田聖者受已必為說三有過失令施者如理思惟自證聖果此顯二乘出世樂亦由施得發誓利益衆生者由施不久得歡喜菩薩擐大誓甲利益衆生由施波羅密圓滿不久即登歡喜地由前悲性非悲性故唯布施為要行悲性謂以大悲為體性之菩薩非悲性謂非以大悲為體性之凡夫二乘皆由布施始獲其所求之樂故唯布施為修行要道也且如佛子聞求施思惟彼聲所生樂聖者入滅無彼樂何況菩薩施一切此顯菩薩之意樂菩薩聞衆生來求布施之聲思惟我為施主能滿衆生之願譬如父母有大産業遺其子女自心快慰不可名狀較聲聞入寂滅涅槃煩惱寂靜之樂猶為過之以彼唯自利此則既滿己布施之願亦滿彼求樂之願故但聞其聲樂尚如此何況真能行大布施故聞求施語則喜舒手行施則樂施已亦復無悔深生隨喜初中後三時唯是極大殊勝喜樂也由割自身布施苦觀他地獄等衆苦了知自苦極輕微為斷他苦勤精進此顯菩薩布施之堪忍與精進地上菩薩布施時割自身肉亦無痛苦如經云通達緣起性空者視割身肉如剝樹皮菩薩身如藥樹一任衆生折其枝葉乃至掘其根株以療疾苦不作是念此樹為我彼樹為他傷此樹時我有苦傷彼樹時我無苦也此說布施苦者如說佛往昔捨身受苦因緣皆是地前之事加行位前布施意樂未成熟施身肉等佛亦不許加行位中意樂久經熏成能施身肉然仍有苦以如理觀故雖苦能忍受不退謂觀地獄中苦如菩提道次第所說八寒八熱等獄人世之苦無可為喻為救彼衆多受苦有情積集福德資糧須行布施雖捨身肉比地獄苦仍極輕微如患重病者欲療重苦針灸等痛亦能忍受菩薩為利衆生而行布施雖割自身之肉其苦亦能忍受倍增精進佛因地中如斯苦行極多無量施者受者施物空施名出世波羅密由於三輪生執著名世間波羅密多此顯布施波羅密出世非出世之差別空謂如幻非謂施者受者施物皆無若以三輪俱無為出世波羅密一切衆生皆已圓滿施度矣達三輪性空施度始能圓滿名出世波羅密未見道前行施不達三輪性空雖可觀想成空然非實證尚不得名波羅密然以其能斷慳貪與施度相應又以回向力攝持亦為成佛之因由其隨順出世波羅密之故亦名波羅密極喜猶如水晶月安住佛子意空中所依光明獲端嚴破諸重暗得尊勝此一頌繼以喻顯初地功德月喻極喜地者有三義一高尚二光明三尊勝證性空慧者始達故高二菩提心圓滿無量功德莊嚴故光明除諸熱惱障品饒益無量衆生故尊勝意者心也佛子之心喻如虛空空慧為能依此心為所依以空慧月故所依之心如虛空為月所照耀亦獲光明一切心皆有無量功德莊嚴也暗謂愚癡慧光能破癡暗作大福田故曰尊勝第二菩提心離垢地彼戒圓滿德淨故夢中亦離犯戒垢身語意行咸清淨十善業道皆能集十地在此宗稱為十種菩提心此第二種勝義菩提心持戒波羅密圓滿初地未離之微細犯戒垢悉已離盡故曰離垢地彼者指由初地善上進趣二地之菩薩一阿僧祇集積資糧圓滿布施波羅密多以後持戒功德增勝而成此果戒圓滿德淨有二釋或戒圓即德淨謂戒圓滿之功德清淨也或戒圓與德淨謂戒圓滿餘德亦淨也衆生醒時乃至重戒亦常故犯菩薩於重戒誤犯之事亦決無有若至二地則雖在夢中乃至最微細戒亦不誤犯此由平時持戒謹嚴熏習力故譬如人喜讀書無論其為經論世典乃至小說之類若心念專注乃至夢中亦與書義不離熏習力故行即是業三業清淨遠離十不善業也十善業道謂不殺乃至不邪見衆生於殺生時亦有惻隱不忍者亦有無同情反以為快者可見人之習氣有善有惡但由無始惡業習氣較強受生之時即有俱生惡習長大以後為謀生之追求及社會之影響身語二業常與不善業相應又因追求而起貪求不得而起瞋乃至撥無因果種種邪見故吾之三業幾於終日與十不善道相應雖知用力克服猶且不能遮止偶有一念之善亦由諸佛菩薩之加被非自能主宰也唯既發菩提心後則能盡力止惡修善經一大阿僧祇劫熏習成熟初地以後通達空性於一切無所貪吝然後戒德始能圓滿清淨也如是十種善業道此地增勝最清淨彼如秋月恆清潔寂靜光飾而端嚴此一頌顯初地以前亦修十善唯此地最為超勝即微細毀犯亦斷除清淨放獨名離垢也印度夏為雨季秋恆無雨其時雨季已過塵氛盡洗故秋月特為光潔清潔言自體無障寂靜謂不同日光炎熱光飾端嚴言衆生樂見喻菩薩持戒圓滿離犯戒垢障自無犯戒熱惱亦息衆生熱惱為衆生所樂見也若彼淨戒執有我則彼尸羅不清淨故彼恆於三輪中二邊心行皆遠離寶積經迦葉請問品說若人一切行為皆如律制乃至微細毀犯亦無唯執有我我所此人名為破戒似善持戒見不淨故此即上二句之意尸羅此翻為戒本義為清涼息犯戒熱惱故下二句顯菩薩持戒達三輪性空三輪之義後當說二邊者或執常或執斷或執實有或執無因果等菩薩於此悉遠離失壞戒足諸衆生於惡趣受布施果生物總根受用盡其後資財不得生此一頌言布施不持戒之失布施持戒相較布施易持戒難人稍富裕者多能行施以於己之行動無束縛之苦故若欲持戒則覺處處防礙不得自在故衆生雖有福報布施尚易持戒則難戒足者謂戒為趣人天善道所依如人有足也布施雖能感大財富之果若不持戒必墮惡趣則於惡趣受多財之報如印度之象有衆寶瓔珞今貴人畜哈巴狗亦繫金鈴海中龍王珍寶尤多此畜生多財者也如毗沙門眷屬臧巴拉為守財神仍屬藥叉部餓鬼中亦有有財鬼孤獨地獄之有情亦有大財富皆於惡趣受施果也福業之於樂果如油之於燈明若燃燈而不加油油燃盡時燈亦熄滅人由布施而感多財之報由多財故更行布施則後後生中福報轉增若墮惡趣重苦所逼愚癡增勝不遇正法不明因果即有財富不能培福施福享盡更無培福之因矣生物總根謂種子若人有一升麥種播於田中則可取若干升斗之麥若以所收之麥播之又可收更倍於前之麥若有一升之麥即磨而食之即永無麥種可得施福享盡者更無培福之因亦猶如是若得自在住順處設此不能自攝持墮落險處從他轉後以何因從彼出此一頌示應即生善趣時力勵持戒一墮惡趣無法超出如有勇士力敵多人若手足被縛投於險坑則雖有勇力不能自脫生人天者自有慧力能抉擇善惡因果不隨惡業而轉自能攝持不墮惡趣順處者謂平坦安然有自在之處喻善趣也若於此時不乘有暇圓滿之良機力勵持戒若為犯戒之繩所縛投於惡趣險坑身心無暇愚癡所覆不聞正法即使觀音文殊諸大士入地獄中降甘露雨度脫衆生因緣未會亦難幸遇由是唯隨惡業而轉何因復能出彼惡趣如伊鉢羅龍王於迦葉佛世為精進比丘以輕毀心犯佛禁戒折伊鉢羅樹葉遂墮龍身備受衆苦乃至釋迦出世來問何時脫此苦報如來亦不為授記令彼待彌勒出世時更問彌勒能為授記否尚未可必也可見一落惡趣欲出極難是故勝者說施後隨即宣說尸羅教尸羅田中長功德受用果利永無竭勝者謂佛能勝一切惡故因為只行布施不持戒有如上過失故佛於布施後說持戒也下二句顯持戒能長其餘福德戒如良田能長一切功德之種以持戒為基礎修諸福德則在人天善趣受用果利展轉增上故永無竭也諸異生及佛語生自證菩提與佛子增上生及決定勝其因除戒定無餘此一頌顯世出世善皆從戒出欲界人天樂果由十善戒而得益以禪定則生色界無色界若修清淨十善益以出離心則為聲聞修其清淨十善慧力轉增則為獨覺自證菩提即獨覺若修清淨十善益以大悲方便則為菩薩成佛之因增上生謂人天善趣決定勝謂出世涅槃此二皆由持戒出也猶如大海與死尸亦如吉祥與黑耳如是持戒諸大士不樂與犯戒雜居此一頌顯犯戒者不得與善士親近死尸在大海中必被浮出黑耳謂不吉祥有吉祥處必無不吉祥喻惡人必為善人所棄遠也以持戒之人其師友弟子必皆持戒故由誰於誰斷何事若彼三輪有可得名世間波羅密多三者皆空乃出世此頌簡別世間出世間戒波羅密由誰謂持戒者於誰謂戒境斷何事謂不殺等佛子月放離垢光非諸有攝有中祥猶如秋季月光明能除衆生意熱惱此總頌二地持戒功德非諸有攝者謂此戒是出世波羅密此地為性空慧所安立非三有攝也有中祥者謂二地菩薩能作轉輪聖王以十善業教化衆生令獲一切樂果於諸有中為如意寶也第三菩提心發光地火光盡焚所知薪故此三地名發光入此地時善逝子放赤金光如日出此一頌釋發光地名由離垢地戒清淨故而生定慧發智慧光名發光地所知者謂於所知境所起法愛定愛火光焚彼如焚薪故赤金光者非同初二地慧唯是寂靜光明此轉明利如初日光設有非處起嗔恚將此身肉並骨節分分割截經久時於彼割者忍更增此顯三地菩薩忍辱功德非處者謂菩薩於衆生有大恩德是不應起嗔恚之處衆生不知恩報恩反以怨報德在平常人橫逆之來必不能忍菩薩不然設有衆生於此三地菩薩作大損惱乃至分分割截身肉骨節令彼求死不得菩薩視彼如割虛空絶無不忍之念又觀彼衆生由作損害於大福田將墮大苦轉生悲憫如子病狂傷害其母母不嗔恚念子病劇轉增愛憐求拔其苦已見無我諸菩薩能所何時何相割彼見諸法如影像由此亦能善安忍上一頌顯由悲故忍此一頌顯由慧故忍菩薩已達無我見諸法如影像幻化不實由此空慧力不見有能割者割時割相可得亦能安忍如佛往昔為忍辱仙人被歌利王割截肢體是其例也若已作害而嗔他嗔他已作豈能除是故嗔他空無益且與後世義相違此下顯衆生不忍之過失語云一念嗔心起八萬障門開又云一把無明火燒盡諸善根佛見比丘禮塔語諸弟子觀此比丘以清淨心禮拜故其所感福如其身所按處至金剛際所有大地極微塵數每一極微有千世轉輪王之福塢波離尊者問彼福何因可盡佛言但起一念嗔心即可滅盡故作善之後必要回向無上菩提一者為遮邪願回向非處故二者為防嗔恚壞善根故若他已於我作損害嗔何用如火焚我屋水漂我田我嗔水火水豈能漂其土以還我火豈能修復其屋以償我乎對菩薩行者來說若人打我罵我我不還打還罵彼力疲極自有止息之時若我以打報打以罵報罵彼此反報豈有已時我雖打彼豈能減我被打之痛況起嗔心定感來生惡趣之果故不忍唯有損無益既許彼苦能永盡往昔所作惡業果云何嗔恚而害他更引當來苦種子此頌顯若信因果必能堪忍謂既生五濁惡世必須堪忍若不能忍唯有往極樂世界現前受苦果皆由自身前世既未植無漏因出生死海又未造人天福報之因故感此報於人何尤如火性本能燒人不觸火火亦不自燒人三界火宅本是苦聚我既流轉生死即定有苦若得出生死彼苦即永盡我自不出生死長劫受苦於人何尤況人世所受苦果多是他生惡業已經惡趣償報未盡所有殘餘不樂之果若能忍受即可永盡往昔惡業若不忍受又起嗔恚而害他人更引當來惡趣之果則受苦無盡譬如大病之後殘病未愈醫令禁忌一切不宜飲食若不忍耐不遵醫教病將復發無可救治佛為醫王教人忍苦即從此永盡惡趣病也若有嗔恚諸佛子萬劫所修施戒福一剎那頃能頓壞故無他罪勝不忍嗔心之害較勝於貪嗔心重者乃至能殺父母故障慈悲之力最強貪心猶能攝受衆生嗔則能斷菩提心根本若菩薩對菩薩起嗔其過尤重一念嗔心能頓斷百劫施戒之福故人雖有布施持戒功德必賴忍辱攝持方能不失也使色不美引非善辨理非理慧被奪不忍令速墮惡趣忍招違前諸功德嗔恚之失一者使色不美嗔恚之人勃然變色見者皆畏而避之後生感報生毒蛇中雖五色斑斕而人終畏其毒雖生人中五官不正諸根不具父母亦不喜見二者引非善業如殺盜等三者無有智慧辨別是非二人諍鬥至少一人非理旁觀者了然能見以彼心平氣和故而彼諍鬥者各執己是不見己過由嗔蔽故四者由嗔造業速墮惡趣不忍過失如此忍則反是招諸功德忍感妙色善士喜善巧是理非理事歿後轉生人天中所造衆罪皆當盡此一頌顯忍之功德與不忍過失相違感妙色者如釋迦往昔成佛以前常常衆相圓滿阿底峽尊者亦言我以相圓滿故早年常為善知識之所攝受善巧是理非理者能推己及人反躬自責尤為菩薩道之中心也生人天者由忍不作惡故了知異生與佛子嗔恚過失忍功德永斷不忍常修習聖者所讚諸安忍此頌總結上五頌由知異生嗔恚之過失佛子忍辱之功德故斷不忍常修安忍縱回等覺大菩提可得三輪仍世間佛說若彼無所得即是出世波羅密此一頌抉擇世間出世間差別等覺謂佛三輪謂能忍者所忍境忍辱事若著三輪雖回向無上菩提仍非出世若於彼三輪無所得乃出世也此地佛子得禪通及能遍盡諸貪嗔彼亦常時能摧壞世人所有諸貪欲此顯忍辱之外諸功德禪謂四禪無色定四無量心通謂六通三界貪嗔癡盡三地菩薩常為忉利天王為諸衆生宣說五欲過患故能壞世人貪欲如是施等三種法善逝多為在家說彼等亦即福資糧復是諸佛色身因此一頌總結前三地施等謂施戒忍於出家在家二衆中多為在家說以出家衆於彼易行不待多說故於因中二資糧是福資糧於佛果中所得法身色身色身即報身與化身是色身因發光佛子安住日先除自身諸冥暗復欲摧滅衆生暗此地極利而不嗔此總頌發光地菩薩發光地如初日殊勝光明日體自有光明故先除自暗由慧極利知一切如幻知因果不虛故能不嗔也第四菩提心焰慧地功德皆隨精進行福慧二種資糧因何地精進最熾盛彼即第四焰慧地此一頌說焰慧地精進功德謂精進熾盛如火焰故此地唯有二頌應精進理未廣說者上三地中所說應布施等之理即是應精進行布施等之理故不再別說但總說一切功德皆由精進引生前三度為福資糧後二度為慧資糧此精進通五度亦即通二資糧功德者總攝一切福慧資糧也精進如溝渠善法如水有溝之處始可獲灌溉之利精進如鞭善行如馬馬無鞭策則怠緩不能疾行故經云有一法門失諸功德謂懈怠若無精進諸善功德皆不得成精進者能止惡修善之力也即三十七菩提分法之四正勤謂已生惡令斷未生惡令不生未生善令生已生善令增長若於惡法勤行是名懈怠不名精進衆生於修功德常多因循謂今日不作有來日今年不作有來年不知無常迅速不與人期人命短促於生死長夜中不過如電光一閃若不乘此熹微之光早向坦途前進漫漫長夜滿地泥塗將何托足乎臨命終時良醫束手眷屬圍繞自知命盡怖畏張皇追悔無及矣如阿育王統南瞻部洲威德等同輪王能役使鬼神造人間地獄以怖暴惡衆生造八萬四千塔遍於瞻部命將終時諸臣以王好施凡物入手即轉以施人凡王所求索皆不給與王教令不能行於臣下財位庫藏一切不得自在最後求索庵摩羅果得半枚此半枚庵摩羅果乃王威權所及可自由食用王語一最親信侍臣將此半枚庵摩羅果往雞圓寺供諸比丘時諸上座多是大阿羅漢語大衆觀今日半枚庵摩羅果之主人即當年役使鬼神造八萬四千塔之輪王彼施此半枚庵摩羅果功德大於造八萬四千塔以此是其唯一所有之物故觀此可見人應及時為善勿待衰老不得自在欲積功德不可得矣立焰慧名有二因一者於六度中精進熾盛最為圓滿二者於三學中慧學增勝發生通達菩提分法之出世慧光故此地佛子由勤修菩提分法發慧焰較前赤光尤超勝自見所屬皆遍盡此頌顯精進以外之功德前半頌釋此地名一者三十七菩提分法圓滿菩提謂佛果亦指空慧分者因也屬於與證菩提為因之法名菩提分法共分七類一四念住謂意念安住於此四事能治常樂我淨四倒一觀身不淨謂毛髮齒爪血肉皮骨等三十六事無一是淨二觀受是苦謂受若是樂應多多益善今一切寒熱等受過寒過熱皆覺其苦則所謂清涼溫暖唯以離炎熱寒凍之苦名為樂受實非是樂三觀心無常謂心念念遷流不可得四觀法無我法無我義下當廣釋二四正勤如前已說三四如意足一欲神足謂意樂修定之欲心所引定二勤神足謂修定之精進力所得定三心謂有曾習修定之種子四觀謂智觀察所得之三摩地以上三類屬資糧位四五根一信謂正信三寶二進謂於善法勇悍三念於應作不應作無忘失四定善住所緣不隨煩惱轉五慧善能分別得失五五力即前五根增長有力更不退轉且有力令他隨轉以上二類屬加行位六七覺支念擇法精進喜輕安定捨七八正道正見正語正思維正業正命正精進正念正定小乘說八正道屬見道七覺支屬修道大乘說七覺支屬見道八正道屬修道非凡夫事故不詳釋二者智慧增上三地如初日此地如日中三者我見所屬之人見衆生見壽者見等皆遍盡自見即我見也第五菩提心難勝地大士住於難勝地一切諸魔莫能勝靜慮增勝極善知善慧諸諦微妙性大士者超人也謂發大心之士夫難勝義他處釋為二諦圓融此處釋為魔不能勝義利根菩薩修般若得佛加持在資糧位魔已不能勝最鈍根者極至五地魔決不能勝矣利根聲聞亦能降魔如塢波崛多尊者降伏大自在天是也此地以靜慮功德殊勝為差別第六菩提心現前地現前住於正定心正等覺法皆現前現見緣起真實性由住般若得滅定此一頌釋現前地名現前謂第六地菩薩正定即第五地之靜慮正等覺法現前者謂與佛法最接近速當證大菩提依第五地靜慮般若圓滿故於緣起真實無我性現見無礙上三句顯般若圓滿下一句即華嚴文義滅定謂真如理由依圓滿靜慮且具達空性之智慧故能得滅定如有目者能引導無量盲人到止境如是智慧能攝取無眼功德趣聖果此讚般若為一切功德之引導五波羅密如五盲人無慧為導不能到出世聖果之止境為成佛色身之因仍為生死流轉之因且因彼功德所感福報得大勢位自在若無智慧依之造惡反為自害之因如佛說騾胎竹實之喻攝取謂收集也如彼通達甚深法依於經教及正理如是龍猛諸論中隨所安立今當說此顯般若深廣非己能說論主自言如彼六地菩薩所達甚深之法非我境界雖諸經教宣說彼理然佛甚深密意亦非我淺慧所能測唯如龍猛依經教所立諸論我今隨彼所安立當說六地所達真理以龍猛所證與六地智慧相同故若異生位聞空性內心數數發歡喜由喜引生淚流注周身毛孔自動竪此一頌顯能聞般若之機謂正當機非結緣衆也聞謂聲入心通非如秋風過耳如佛所謂諦聽諦聽善思念之是也若利根人聞說空性如貧人但有空箱一旦開視忽見珍寶充塞或老人有獨子幼年走失久無再見之望一旦榮歸拜父如是喜出望外樂不自禁念佛說此甚奇希有之法恩德無比自身於生死長夜中亦不知何幸種此善根於是喜極涕零亦猶如是若鈍根人由於無始實執平時雖說空空如山鳥啼一旦真聞空理如人有重寶珍藏篋笥一旦開視竟已不翼而飛起大恐懼故聽般若者若能通達乃多生善根習氣若不能通達即是先無熏習若今再不學則不通不學不學不通何時通達乎故吾人今雖未能即達空性於此斷惑證滅之要道仍有研求之必要也彼身已有佛慧種是可宣說真性器當為彼說勝義諦其勝義相如下說此顯如彼之人是真法器已有佛慧種者謂已多聞般若熏成善根也可宣說真性器者謂可聞真實性之法器彼器隨生諸功德常能正受住淨戒勤行布施修悲心並修安忍為度生善根回向大菩提復能恭敬諸菩薩善巧深廣諸士夫漸次當得極喜地此二頌示聞般若教引生功德彼具足空慧種姓之法器聞說空理不起誹謗且能引發隨順空性之功德以真達空性故知空性不離緣起以有因果緣起故說性空是故不墮斷見若不真達性空或執無戒可持無福可作於持戒修福者訶為小乘鈍根如墮野狐身之禪師說上智之人不落因果然因果不由撥無而遂空彼真是法器者不唯能信解空理又能修積一切福德資糧一者正受住淨戒謂以清淨信心對諸佛菩薩大善知識如法而受受已如法而持彼由愛樂般若故恐由犯戒之故人身尚不能得何由得聞性空故特能持戒二者勤行布施以知資財空不堅實故又恐由不布施感衆緣不具之報無暇聞法故三者修悲心知但有空慧而無大悲只能證聲聞果故四者修安忍知一切空不見有可嗔者故觀衆生皆父母故知感妙色為善士所攝受故五者為度生善根回向大菩提於諸功德無慳吝故六者能恭敬諸菩薩於能如法宣說勝義真實教之大菩薩知應恭敬故不見自身有可憍故如釋迦往昔作常不輕菩薩見一切人皆禮拜謂汝是當來之佛亦是為我圓滿成佛資糧者又既發心利益衆生當自視為衆生公僕復何諍鬥嫉妒之有故常能恭敬若真法器善解空性應有如上功德也雖解空性尚須經資糧加行二位由善巧甚深空理故能積集廣大福德方能登極喜地求彼者應聞此道此一句勸學般若謂求佛果或求登地或求成法器應聞此般若道也彼非彼生豈從他亦非共生寧無因此總標無生四句之宗也華嚴經說六地所證十平等性謂無生無相等龍樹菩薩則以無生為十平等性之總門若達無生性即達一切空性亦即達一切緣起真實性也為成無生之義故立四宗一者彼非彼生彼者泛指任何一法謂彼法決不從彼法自體生二者豈他生謂彼法亦非從他法生三者亦非共生非自與他共生四者寧無因謂法亦非無因生也此即中論歸敬頌後開宗明義第一頌諸法不自生亦不從他生不共不無因是故知無生之義龍樹菩薩謂諸法若有實體性之生於此四者之中必居其一四者既無一可成故無實性之生唯有因緣假生也彼從彼生無少德此下廣破四種生自此句下五頌半破自生執自生者以數論師為首彼謂一切法先有體性後發展而出有自性而後生即是自生彼宗之說略近二元論彼謂宇宙萬有之因為神我與自性神我為享受者自性為變化者由神我動念欲受用故自性即發生宇宙萬有如萬寶囊出一切物總為二十五諦彼自性者體具三德謂喜憂暗即貪嗔癡其性為輕動沉重昏暗此三性平衡時自性不起變化即為冥性若失平衡則起變化以有變起諸法功能說名自性彼雖不顯說從自生然執萬有根元即自性於自性中有具體而微之諸法即自生之義也神我後時厭諸受用境遂修禪定而得天眼由是見諸法之因為自性自性為神我所見遂起羞怯收攝其所變化神我與自性遂獨立而得解脫此即彼宗所執流轉還滅之理其餘一切執自生者皆同此破此句頌文顯自生無義無少德者謂無纖毫取義若彼法即從彼生彼既已有何用復生有已復生應同頭上生頭成為冗贅之物又生已復能生生則無窮一切成無量如樹先無果後時生果則有受用之利彼既先有後時生者復何所益耶生已復生不應理從自生即是生已復生此總標其失下別破若計生已復生者此應不得生芽等盡生死際唯種生此顯無窮過初一句牒其計次二句出其過若如汝外道所言生已復生者今以世間現見穀種為喻種既生已應復生種不應生芽又種既生已復能生種自力能生更無法可令不生則乃至生死未空種應常生種無有窮盡云何彼能壞於彼此破伏救外道救言芽生之時即種壞時二者同時同一體性故名自生芽有時即種無故無無窮之過此破彼云汝先謂芽即是種今言芽生能壞於種云何彼自體還壞自體要各有自性始可說此壞於彼故又種子即芽若芽能壞種種亦應能壞芽實不如是故汝救非也異於種因芽形顯味力成熟汝應無此顯無異過謂如汝執芽體即種體芽上所有之法種上亦應有若種上所無之法而芽上有從何而來汝執芽一切從種出故今芽形長種形圓芽色緑種色黃芽味苦種味甘芽能治之病非種能治芽謂變化成熟種非成熟如是芽上形狀顯色味作用分位一一與種子不同若如汝執此諸差別皆應無有若捨前性成餘性云何說彼即此性彼救云芽時捨種性故芽與種體雖是一而性變易形顯味力等不全同也上句牒彼計云若汝謂捨種性而成芽性餘性者謂芽性為種性之餘即異於種性下句破彼云芽性種性既不同云何說言彼種性即此芽性耶上一破顯芽種體二應無異此破救顯芽種若異應非一體得此則失彼也若汝種芽此非異芽應如種不可取或一性故種如芽亦應可取故不許此就可取不可取破也芽生之時種子已壞芽可見種子不可見以芽從種芽應不可見量云芽應不可取汝許種芽不異故如種又以種從芽種應可見量云種亦應可取汝許種芽一性故如芽故不許者結不許彼種是芽自體也因滅猶見異果故世亦不許彼是一上以道理破此以世間現見破也謂世間現見種子滅時猶有芽可見故世間亦不許彼種子與芽是一汝又有世間相違過也故計諸法從自生真實世間俱非理此總結上句牒其計下句斥其非真實者謂道理世間者謂世人現見於二者中均不能許種芽一體也若計自生能所生業與作者皆應一非一故勿許自生以犯廣說諸過故此類破也若計自生牒其計也能所生業與作者皆應一出其過也非一故顯現見相違也勿許自生勸彼捨其所執也以犯廣說諸過故例釋也謂若汝計種即是芽能生即是所生母應即是子女能作即是所作陶師應即是瓶瓮等能燒即是所燒火應即是柴炭等現見母與子女陶師與瓶瓮火與柴炭並非是一故勿執自生以犯如前廣破諸過故若謂依他有他生火焰亦應生黑暗又應一切生一切諸非能生他性同此下破從他生執他生者內道小乘大乘唯識乃至中觀宗清辨等皆攝在內彼依佛說四緣生諸法更無第五緣謂緣及所生果各有自性故從他生謂色法之果定有二緣若此一法正為彼法作因如泥為瓶因是為因緣除因緣外餘法助果生者如作瓶時和泥之水燒坯之火名增上緣於心法之果則具四前所熏成習氣種子為因緣心起時所對之境為所緣同類心前念過去為次念讓出地位為等無間緣眼識生時以眼根空明等為增上緣小乘唯識中人謂緣有自性果有作用非假立亦有自性故緣與果各有自性果從緣生故從他生初句牒彼計云若依他緣而有他果因果自性各別因對果名他果對因亦名他也因果各有自性則因性非果性因非果性能生果那麼除因以外餘一切法應亦能生此果俱非果性故量云非因應能生果非果性故如汝所執因亦可破云石頭應生稻芽非稻芽性故如汝稻種芽性有別一能生一不能生不應理故又非因若能生果相違之因應生相違之果火焰應生黑暗其實不爾是故不然又非因能生果石應生人狗應生人頭人應生狗尾鴉應生孔雀毛孔雀應生鴉毛一果應從一切因生一因應生一切果一切因應生一切果因果混亂成大過失諸非能生者謂非因之一切法也他性者謂非果性因與非因同非果性故不應說前者能生後者不能生也由他所生定謂果雖他能生亦是因從一相續能生生稻芽非從麥種等此牒彼救也初句謂果定由他生第二句謂因於果為他雖與非因同然以能生故名此是因第三句謂能生因要具二義一要與果同一相續如一人少年壯年同是一人二要在果前能生必在所生前故一相續簡因以外一切非果性法能生簡一相續中所生之果是故麥種稻種雖同非稻芽性然稻種稻芽同一相續故稻芽從稻種生麥種稻芽非一相續故不從麥種生此釋通前非因亦能生果之難也如甄叔迦麥蓮等不生稻芽不具力非一相續非同類稻種亦非是他故此破彼救也破云稻種於稻芽應非一相續非同類非稻芽性故如甄叔迦麥蓮等種芽既各有自體以何定其為同一相續同類乎次破云汝稻種應不生稻芽或不具生稻芽之力於稻芽非一相續非同類故如甄叔迦麥蓮等甄叔迦花樹名芽種既非同時有無他云何種是他芽從種生終不成故當棄捨他生宗此又就他性不成而破他生也因果不同時既為共許故種時無芽以無所對之芽故種云何名為芽之他要芽種同時方能對芽自體名種為他也如對子名父尚無有子云何稱父第三句結他生不成第四句勸捨彼執也猶如現見稱兩頭低昂之時非不等所生能生事亦爾此彼引佛語救也佛說因果如稱兩頭低昂時等因滅果生同在一時以生滅作用同時故生滅法因果一定同時故無他性不成之過設是同時此非有此總破其救謂縱許稱之兩頭低昂同時因果仍不同時故此所諍他性仍非有又此因果與稱兩頭非盡相同稱不低昂兩頭同時可得因果縱如汝許亦唯於因滅果生時同時可得不生滅時即決不可俱得也況因果生滅不能同時其理當如下釋正生趣生故非有正滅謂有趣於滅此二如何與稱同此上一句釋破謂正生必非生已乃趣向於生既非生已則其物尚無故果正生時果即非有又正滅非謂滅已乃趣向於滅既非滅已則其法尚有故因正滅時因尚是有因有果無云何如稱兩頭同時俱有此生無作亦非理此破伏救謂彼救言因果二法雖不同時因滅果生仍可同時生滅同時彼滅為此生之因故可說從他生此破彼云所生之果無故生之作用亦無作用與法不離故具生之作者既無故不可說生滅同時眼識若離同時因眼等想等而是他已有重生有何用若謂無彼過已說彼復救云佛說眼識生有同時因謂眼等根及作意受想等心所故因果同時無過然佛說同時因果但說二法同時觀待未說各各實有自性故此破彼云若如汝計眼識離眼根及想等心所而有各別對立之自體則眼識已有何用再生生已再生等同自生有無窮之過若謂於眼根等外無彼對立眼識則仍墮無他性之過如上已說生他所生能生因為生有無二俱非有何用生無何益二俱俱非均無用此以果有無四句總破他生所生為果之異名初二句問彼汝所謂能生果之因為生先有之果為生先無之果為生亦有亦無二俱之果為生俱非有無之果若因果有自性者於此四句中汝必居其一若先有果而生已有何用生若先無果而生先無何能生若亦有亦無而生則俱有同上二過若非有非無而生非有同無非無同有仍是亦有亦無其過亦同世住自見許為量此中何用說道理他從他生亦世知故有他生何用理彼以道理不能立他生故捨道理以世間現見為救與論主出世間相違過也謂世人皆依自所見以為真實事實勝過雄辨何用多說道理他從他生如母生子如種生芽世所共知故現見有他生何用道理推求乎然現見者未必實有不現見有未必斷無如人之祖先雖不現見然可推知必有人身剎那無常之相自身亦不能現見然以有少壯衰老亦可推知必有反是如鏡像夢境非不現見然非實有故實有非實有要由道理觀察方能決定如其實有必道理觀察可得五識所見唯是現象乃諸法之皮毛即眼識現前所見一切器具亦唯見其表面一層其表面以內之物即非眼識所得何況真理豈是五識之境世人由無始名言虛妄分別熏習之力見諸法從他生然不見有自性因果之他生也彼由見有他生故遂執實有他生今所諍者正諍世人所見他生是否有自性云何汝以彼見有他生難我所說無自性他生乎由於諸法見真妄故得諸法二種體說見真境名真諦所見虛妄名俗諦此總解二諦也於諸法上見諸法真理者即聖智慧見虛妄現象者即凡夫知見顛倒心錯亂識由彼智慧所見為真諦顛倒心所見為俗諦此龍樹宗分別真俗二諦義也上文通外難云我今與汝抉擇諸法有無自性非諍諸法有無等同說云我與汝抉擇勝義諦邊事非諍世俗諦邊事彼復問何為勝義及世俗故今廣釋二諦也妄見亦許有二種謂明利根有患根有患諸根所生識待善根識許為倒無患六根所取義即是世間之所知唯由世間立為實餘即世間立為倒此二頌分別正倒兩種世俗也中觀宗清辨派謂世俗諦中境有正倒心皆是正境有作用者為正無作用者為倒如第二月如鏡中像月稱派謂境有倒正心亦有倒正皆有作用作用各各不同而無體性同此二頌文正對清辨派而發也妄見謂不見真實之見即見世諦之見明利根謂如眼無翳障有患根如病翳眼善根即明利根有患根所見較明利根所見顛倒尤甚名倒世俗明利根所見境唯有無明障覆之錯亂無現見顛倒因如翳障等為世人共知較有患根所見為正確對倒世俗名正世俗唯就世俗立為無倒真實其餘有患根所見即世人亦知為倒不待道理觀察也無知睡擾諸外道如彼所計自性等及計幻事陽焰等此於世間亦非有此舉倒世俗之倒也如被無明睡眠所擾害之外道計自性神我大自在梵天毗紐天等如彼癡人於幻象馬計實象馬於陽焰計水於世人共知虛妄之事計為真實此雖世間亦不許有故名倒世俗如有翳眼所緣事不能害於無翳識如是諸離淨智識非能害於無垢慧此因譬喻順答前難也謂如翳眼於淨椅上見髮蠅等淨眼不見謂無髮蠅不能以翳眼所見髮蠅為作妨難今說真理應以聖智為量世人之見與聖人之見如同無知鄉愚與大哲學家不可相提並論云何以無淨智凡夫六識所見為聖人淨智所見宇宙真理作妨難乎癡障性故名世俗假法由彼現為諦能仁說名世俗諦所有假法唯世俗此別釋世俗諦也世俗謂障礙真實猶如雲翳故即愚癡名為世俗以能障宇宙真理故癡障性者謂愚癡能障真實性假法謂因緣生法彼謂無始愚癡障具縛凡夫於因緣假法由愚癡障見彼為有性不知是假佛說名世俗諦鏡像陽焰亦為凡夫所見但凡夫亦知彼為假故不名諦但名世俗法聖人後得智亦見世俗諦然知其如幻如化乃是假有故亦不名諦唯名世俗法故凡夫所見假法聖人所見假法皆唯名世俗也如眩翳力所遍計見毛髮等顛倒性淨眼所見彼體性乃是實體此亦爾此別釋勝義諦世間難解無過諸法真實性以衆生無始以來從未見彼今欲為衆生宣說諸法真實等同為生盲說日最易引生誤解如說真如說如來藏一類衆生復因此生執不達真實云何解釋勝義諦當觀維摩詰經諸大菩薩聲聞各說諸法實性已文殊菩薩說諸法實性不可說次至維摩居士默然無說蓋諸法實性如人飲水冷暖自知不可說示說不可說已如頭上加冠未免多添纍贅何況以種種相而宣說乎然於不可說中要依所說之一分次第修行方能自證離言實性故仍有多種方便勉為宣說佛說諸有智者以譬喻而得開悟今此頌即以譬喻釋勝義諦也如患眩翳之目見毛髮等周遍計度顛倒執有淨眼見彼病眼所見毛髮體性本空並無彼所謂毛髮毛髮體性尚無更無所謂長短黑白等差別矣淨眼所見無彼毛髮從本以來即無纖毫之體存在非將彼棄去始見為無亦非另見為其他之物此勝義諦亦猶如是即世俗諦在聖智中見為本不存在而已若許世間是正量世見真實聖何為所修聖道復何用愚人為量亦非理此頌反難彼不應以世間現見為量量者謂不錯謬之標準世人不唯於真實不能為量即世間事亦多不能為量人於所學研究數十年仍不能為正量者甚多世人口是心非笑裏藏刀受欺誑者亦復甚多況於真理乎宇宙真理非凡夫所見為求見真實乃修行求證若凡夫能見真實則已成佛多時不須更求聖果所修聖道亦成無用矣以愚夫所見為標準亦顯見其非理也世間一切非正量故真實時無世難若以世許除世義即說彼為世妨難此一頌正答彼違世間現見難謂世間一切六識非觀察真理之正量故於觀察真實時不可以世間現見相違為難若以世間共許之理破世間共許之義則可謂彼宗為有世間相違之妨難譬如有人家中之瓶被竊他人為言汝瓶未失本來無故如夢中瓶則可以世間現見有瓶為難也世間僅殖少種子便謂此兒是我生亦覺此樹是我栽故世亦無從他生此頌進破彼雖世間亦不執從他生謂世間人僅殖種子便謂長大之兒是我生僅殖樹種子便謂此樹是我栽可見世人於種子與兒童樹種與大樹視為一體不執各有自性也由芽非離種為他故於芽時種無壞由其非有一性故芽時不可云有種此答伏難也謂彼難云汝許緣生豈非他生耶答云我所許因果待因名果無實因果以芽與種非各有自性故芽成時種亦未壞故不墮斷邊以芽與種非有實一體性故芽成時亦不可云種尚存在故不墮常邊若謂自相依緣生謗彼即壞諸法故空性應是壞法因然此非理故無性此下三頌總出其執有自性他生之過若謂必有自相始能成立因緣生諸宗共許聖人見道時即達空性聖人應是謗法空性應是壞法之因以諸法實有觀令為無如有器皿椎擊令壞然不可說聖人謗法故諸法定無自性設若觀察此諸法離真實性不可得是故不應妄觀察世間所有名言諦名言諦即世俗諦乃無始名言共許非道理觀察安立若以道理觀察僅得真實理之空性無世俗諦可得以無可得故即破世俗諦破世俗諦即墮斷見故不應自出心裁以道理觀察世俗諦有無自性於真性時以何理觀自他生皆非理彼觀名言亦非理汝所計生由何成於抉擇真性有無時以一異等任何之理觀察自生他生有自性之因果皆不可得不唯勝義中不可得即於名言中以如是理觀察有自性之生亦不可得汝所計之有自性生何由成立乎清辨謂名言有自性勝義無自性此說名言亦無自性正破清辨亦破一切實事師也如影像等法本空觀待緣合非不有於彼本空影像等亦起見彼行相識此喻顯因緣和合自有內外境生不必有自性如影像共許為空然有鏡光明人立在前如是等因緣和合則有影像生彼不唯有像能令見者眼識生起令照鏡者依之得以修治面容影像等者謂陽焰水月夢境谷響等又如氫氣氧氣中無水和合則有水生凸透鏡中無火置日光下角度適宜則有火生木中鑽中無火鑽木亦有火生琴弦與指各無妙音和合則有妙音生人食商陸目中則見諸幻象而牛則以為食料並無異狀人食毒性則死孔雀食之毛愈光澤是皆可見諸法無自性而因緣和合作用不無不待有自性方有因緣生也如是一切法雖空從空性中亦得生二諦俱無自性故彼等非斷亦非常此一頌以法合喻也如上所舉諸例如是諸法雖無自性而因緣和合時從無自性中亦有作用生由因果於勝義諦及世俗諦中俱無自性故因果非一自性故非常非各有自性故非斷由業非以自性滅故無賴耶亦能生有業雖滅經久時當知猶能生自果此下釋業果性空之理衆生生自何來死向何去由何而有諸趣差別為因果中最大問題外道或執業非自作由大自在等所作或執業常而必受果佛法以三法印為與外道分界之鴻溝第一法印即諸行有為法無常外道所執業是造作又有感果作用是有為法而又是常是內道所不許故非此處所諍於佛弟子中共許業是有為法之主要部分有為法必是無常故業剎那不住然業必感果如云假使百千劫所造業不亡因緣會遇時果報還自受如佛往昔見殺魚生一念隨喜於琉璃王誅釋種時以餘習力佛猶頭痛如是之例甚多業既不住又必感果在造業以後受報以前何物持業力令不失乎薩婆多部謂有不相應行法非色非心能持業力令後受果有實自性名之為得復有他部謂有不失法喻如債券貸方以錢與借方到期持券索償本利不失賴有此券而此券是金錢以外之物賴不失法必有果以償業而不失法是業果以外之物經部謂有內心相續業力熏於內心相續故後能感果唯識謂相續是假如旋火輪不能持業不失必有體之阿賴耶實有無覆無記不斷方能受熏持種不失此各宗之說後後較前轉為細密然皆執持業之法有自性中觀宗則謂因緣既無自性業果如幻不需實有持業之法業雖先滅後能感果喻如磁石遠能吸鐵且滅亦無自性云何執業實滅小乘謂物無為滅唯識謂先有後無為滅又云滅是三有為相云何無法為有為相云何無法而是有為故實無有自性之滅法華嚴經謂滅有作用十二因緣最後支死即是滅死能引癡及憂悲苦惱故滅非無作用是有為法以滅而力存故緣不具時滅若未受果未起對治於緣具時仍有力感果由業無自性故無需賴耶等實法以持之以業無自性有作用故業滅後猶能感果如見夢中所緣境愚夫覺後猶生貪如是業滅無自性從彼亦能有果生此喻顯業果性空出轉有經謂如愚夫夢見妙色覺猶生貪夢境無自性覺後夢境已滅猶有引貪之用業無自性雖作業已久死時心中自有先業顯現感其果報如境雖俱非有性有翳唯見毛髮相而不見為餘物相當知已熟不更熟此答伏難若彼難云若以業無自性故謂滅已猶能感果云何已感果之業與未感果之業俱無自性後不感果前能感果耶此答彼云如龜毛兔角與翳眼所見毛髮俱無自性而翳眼唯見毛髮不見龜毛兔角故已熟未熟之業雖俱無自性未熟之業能成熟已熟之業不再成熟感果也故見苦果由黑業樂果唯從善業生無善惡慧得解脫亦遮思惟諸業果由上述之理業果不唯不失且不紊亂由通達無實自性善惡之空慧故能得解脫故須知業果無自性且汝所問果因何由不亂未達空性證一切種智佛不許問以業果微細乃佛智境非凡夫境若以比量妄推測易壞緣起或致狂亂故不許問然如是因如是果法爾如是如人有兩目一口不知何故有兩目一口而具有兩目一口不可謂無也說有賴耶數取趣及說唯有此諸蘊此是為彼不能了如上甚深義者說此答伏難若彼難云汝謂無實阿賴耶何故佛說阿賴耶乎答云衆生無始執我以阿賴耶代彼所執之我先令明外空次明內心亦空然後達佛一切法自性空之密意以此之故佛不唯說賴耶亦說有數取趣說無我唯有五蘊說有如來藏等譬如小兒執物不捨必以他物方能誑取佛去衆生我執方便說有諸法亦猶如是以彼衆生尚未成熟若為說甚深義空性彼或怖畏不能趣入甚至引生斷見故須先以方便漸次引導所謂以楔出楔之喻是也如佛雖離薩迦見亦常說我及我所如是諸法無自性不了義經亦說有此再以喻顯佛有時方便說不實法有如佛雖無我見常說我往昔如何修行我之聲聞弟子等如是佛雖見諸法性空有時對一類之機亦說諸法有以機未熟者不堪聞甚深了義教故如法華說一切衆生皆可成佛而先多處經中說有五種種姓乃至說有衆生決不成佛何故先後如是違反具如法華窮子喻釋又空宗說有假補特伽羅依彼造業受果業果決定不亂且能增長未作不得已作不失極重之業如五無間現生必受次重如殺盜等多次生受乃至極輕之業後後生中因緣會遇亦決受報衆生各由引業所牽往善惡趣同生一趣者引力決定相同然由餘滿業差別同一趣之有情各有苦樂懸殊如是業果之例廣如經說不見能取離所取通達三有唯是識故此菩薩住般若通達唯識真實性此下三頌總出唯識宗唯識宗云六地菩薩所圓滿之般若即是通達唯識真實性唯識真實性即是離能取識無所取境離所取境無能取心三界生死唯識所變猶如因風鼓大海便有無量波濤生從一切種阿賴耶以自功能生唯識如海本無波然有生無量波濤功能因風鼓動則生波濤從含藏一切種子之阿賴耶識因業力風之鼓動有前七識生起亦猶如是以無實所緣境七識唯由自種子功能生非依境生故名唯識解深密經攝大乘論楞伽經俱如是說是故依他起自性是假有法所依因無外所取而生起實有及非戲論境依他起自性實無異體能取所取為現似能取所取所依之因無外所取自能生起體是實有為假所依故非戲論境非言說戲論所緣故無外境心有何喻若答如夢當思擇若時我說夢無心爾時汝喻即非有初句此宗徵問汝說無外境可有內心此無境心以何為喻汝若答云如夢見山河大地實無其境而有心生若我云夢中之心有無尚當思擇若夢境非有夢中之心亦可云非有夢中心無故汝所云無境之心即無同喻若以覺時憶念夢證有意者境亦爾如汝憶念是我見如是外境亦應有汝若救云因覺時尚能憶念夢云我夢見山河大地證有夢中意識我云汝所憶念夢見之山河大地亦應是有同為覺後所憶念故若夢中境有汝夢中心即非無境之心設曰睡中無眼識故色非有唯意識執彼行相以為外如於夢中此亦爾設汝又救云夢中共許無眼識故所見色非有唯由意識執彼自起影像以為外境夢中如是醒時由意識執有外境亦如是如汝外境夢不生如是意識亦不生眼與眼境生眼識三法一切皆虛妄餘耳等三亦不生如於夢中覺亦爾諸法皆妄心非有行境無故根亦無我謂如汝所說識外之境夢中不生無法塵故夢中意識亦應不生夢中根境識三者皆是虛妄觀待假立待所見境說有能見識亦待能見識說有所見境夢中如是醒時亦如是所緣境無故根亦無根境無故識亦無根境識諸法皆虛妄觀待假立也此中猶如已覺位乃至未覺三皆有如已覺後三非有癡睡盡後亦如是如已覺之位在無明癡睡中根境識三皆覺為有如是夢未覺時夢中根境識三亦皆有如睡覺後夢中根境識三皆無如是無明夢覺三者亦無故曰諸法皆虛妄也由有翳根所生識由翳力故見毛等觀待彼識二俱實待明見境二俱妄此破伏救也彼若救云若捨夢喻以翳眼為喻如翳眼見毛蠅等應是境無識有此破彼云病眼見毛蠅等由於翳力生如是識非由識力待彼翳眼所見毛蠅境識俱實待無翳眼所見毛蠅境識俱妄若無所知而有心則於髮處眼相隨無翳亦應起髮心然不如是故非有此進破彼本計無外境有心也初句牒彼計後二句出過第四句結破若如汝計無所知境而有心生則於翳眼見毛髮處令無翳眼隨其處觀亦應起見毛髮等識然於毛髮處淨眼不見毛髮故無外境之心非有若謂淨見識功能未成熟故識不生非是由離所知法彼能非有此不成上三句出彼救下一句破救彼若救云淨眼由見毛髮錯亂識之功能未成熟故見毛髮識不生非因無所見毛髮境也此破彼云汝所謂彼功能我尚不許有云何以彼為因此有能立不極成之過也此所謂功能即唯識說種子已生功能則非有未生體中亦無能非離能別有所別或石女兒亦有彼此以三世推其功能不可得謂汝所說生識功能若識已生何用功能故功能非有若識未生識體未生亦無生此識之功能如人有子方能說為此子之父要有此識方能簡別此是生此識之功能無能簡別之識則無所簡別之功能若許有離能別之所別亦應許有生石女兒之功能二者同是畢竟無故若想當生而說者既無功能無當生上句牒彼救下句出彼過彼若救云雖識尚未生以當生識故說名生識功能如煮飯未熟不說煮米而說煮飯織布未成不說織線而說織布以當成飯當成布故此破彼云以米與線有當成飯與布故假說飯布汝所說功能尚未成立依何物說彼物當有識生若謂飯布假有方可為喻若謂飯布實有則喻亦不成我說汝識非有汝說有功能能生識我說汝功能非有汝又說以當生識故有功能說識時以功能為證說功能時又以識為證二者之因俱不極成均不能成立也若互相依而成者諸善士說即不成若汝謂待能生之功能有所生識待所生識有能生功能二者互相觀待而成龍樹提婆諸善士即說互相觀待成者即是自性不成汝所謂成即我所說不成汝與我說相符更無爭論之處矣若滅功能成熟生從他功能亦生他此破過去識功能上句牒彼計下句出彼過若汝謂有種現熏生之理前識滅後有熏成之功能此功能成熟能生後識則仍是從他生他如是眼識滅之功能亦應生耳識張三識滅亦應生李四之識諸有相續互異故一切應從一切生此破伏救也有相續者對相續而立名如一串珠名一相續此中一一之珠名有相續彼救云已滅眼識功能與眼識同一相續故前識滅能生後識眼識與耳識張三之識與李四之識非一相續故此滅不能生彼此破彼云縱許汝前識後識同一相續然前念後念之心正同粒粒之珠各各互異前識生後識仍是從他生他有前破他生所出一切生一切等過也彼諸剎那雖互異相續無異故無過此待成立仍不成相續不異非理故上二句出彼救下二句破彼救云一相續中諸剎那念念之心雖互異然相續是一無有異性故無從他生之過此破彼云所謂相續尚待成立以彼為因仍不能成立汝宗以相續與有相續若各有體應如貫珠離珠有繩可得離有相續應有相續獨立可得今離念念各別之心無一獨立相續之心故汝所謂相續應唯許仍與念念之心不異若許與念念之心不異即一相續人之前剎那仍與後剎那異體不免他生之過故非理也如依慈氏近密法由是他故非一續所有自相各異法是一相續不應理此以喻顯不成一相續慈氏與近密是二人名如云張三李四如慈氏所有色蘊與近密所有色蘊由所依處不同故非一相續如是汝計前念識與後念識自相各異非同一時而言是一相續不應道理能生眼識自功能從此無間有識生即此內識依功能妄執名為色根眼此下三頌唯識重申彼宗此一頌顯無離識之根謂阿賴耶識中有生眼識功能若依此功能成熟於一剎那頃有眼識生起即此內心識起時所依之功能不知者即妄執為以淨色為體之眼根實無離識之眼根也眼如是耳等亦然此中從根所生識無外所取由自種變似青等愚不了凡夫執為外所取如夢實無餘外色由功能熟生彼心如是於此醒覺位雖無外境意得有此二頌顯無離識境此中謂於唯識宗中從眼根所生識無有處境但由自種子變似青黃赤白長短方圓等相愚夫不知唯識所變執為外境如於夢中實無山河大地由功能成熟生似見山河大地之心如是於醒時雖無外境意識得有似外境現此因上文多方徵難彼往復設救不成故言汝未達我唯識宗義重申其說第一顯無根可有識生次二顯無境亦有識生也如於夢中無眼根有似青等意心生無眼唯由自種熟此間盲人何不生此下四頌重破彼所申義上三句牒彼計第四句難彼若如夢中無眼根但由自種熟故有似青等外境意識生起此醒時盲人亦無眼根何不能生眼識乎若如汝說夢乃有第六能熟醒非有如此無第六能熟說夢亦無何非理上一句牒彼救下一句難汝謂睡時無眼根然有第六意識功能成熟故有夢中所見外境盲人無眼根醒時亦無第六意識成熟功能故不見外境若醒時無第六意識功能成熟何故睡時有第六意識功能成熟既俱同無因我說睡時亦無第六意識成熟功能亦何不可若夢中有醒亦應有也如說無眼非此因亦說夢中睡非因是故夢中亦應許彼法眼為妄識因上句牒彼計下三句破汝能謂醒時無眼非此第六意識功能成熟之因夢中睡眠力乃第六意識功能成熟之因何故睡眠能為第六意識功能成熟之因乎若汝不能說明何故睡眠為意識功能成熟之因則睡眠非彼成熟因也若汝無因而說睡眠為夢中意識因何不許彼夢中所見山河大地等法及眼根為虛妄意識因乎亦可許有虛妄根境為夢中妄識因也隨此如如而答辨即見彼彼等同宗如是能除此妄諍諸佛未說有實法此總斥其非也隨此唯識宗人如何如何答辨總見彼所舉一切因喻等同彼所立宗均尚待成立以唯識說有實法空宗一切不許是實法故對空宗決無極成因喻可得故所舉因喻均尚未成立也以因喻無故所立宗決不能成故應息此無境唯心之妄諍且不唯空宗說一切法不實諸佛亦未說有實法如佛說三界唯識亦據十二有支無明緣行行緣識故以識為三界生死之因故說三界唯識亦未說唯識是實法也諸瑜伽師依師教所見大地骨充滿見彼三法亦無生說是顛倒作意故此破伏救若彼救云諸佛弟子依師長教修不淨觀觀成之時則見大地白骨充滿此所見白骨外境非有而不淨觀有可見無境有心此破彼云彼習不淨觀諸瑜伽師所見白骨其根境識三法皆無自性以定中無眼識故彼能見眼識當知是假眼識假故眼根亦假根識假故所見境亦假佛亦說不淨觀是顛倒作意故非離境實有內識如汝根識所見境如是不淨心見境餘觀彼境亦應見彼定亦應不虛妄此頌反難謂如汝說不淨觀識是實有則不淨觀識所見白骨之境餘未修觀人觀彼境亦應見白骨許同是境無識有故如汝身根識所見之境一人能見餘人亦能見然未修不淨觀者實不見白骨故汝說非理且汝謂彼不淨觀識實有是彼定應不虛妄亦違佛說不淨觀是顛倒之教也如同有翳諸眼根鬼見膿河心亦爾此類破餘喻唯識宗人又謂佛曾說喻云如人見清水鬼見膿河魚見房舍天人見為琉璃習空定者見空同於一境隨心所見不同可見境無心有然佛於此喻中唯說境非實未說見彼之心實有也故破彼云同一境上由業力故諸趣所見不同如前說於無毛髮境由翳力故翳眼見有毛髮鬼見膿河等心非實有亦如翳眼見毛髮等心非實有也總如所知非有故應知內識亦非有此二句總破所知謂境若謂心有境亦應有若謂境無心亦應無二無差別故若離所取無能取而有二空依他事此有由何能證知未知云有亦非理此下破依他起性實有上二句牒彼計次二句徵彼因若汝謂無異體能所取而有二取空之依他起性既無能所取此依他起性因何證知其有若不知而云有無是理也彼自領受不得成若由後念而成立立未成故所宣說此尚未成非能立此破自證分唯識宗人以為二取既是假必須有依他起事為二取分別所依如瓶是假必有地大泥土為依不能依虛空假立為瓶又如繩上蛇覺是假然要依實繩起不於無繩處起蛇覺由彼不說能取所取互相觀待假有故執定自二取空之依他起離言自性之內心為二取所依然既云離言自性何由知有如前一頌所徵唯識宗人釋云即由自心知有若由他心知有是則無窮故云此心自能證知此自知之心名之曰自證分即是識體故此初句破彼云彼自證分不能領受自體以作用不能於自體轉故如刀不自割指不自觸火不自燒燈不自照故心亦不自緣既心不自緣云何自見自體耶第二句牒彼救唯識宗人救云由後能憶念前我曾見境故定有自證分若前未經之境必不憶念若今憶念我昨曾見某境昨日見時必曾有領納我見某境之心見境者為心此心若又為他心領納是則無窮故即彼見境之心自體領納自體是則無過成唯識論因明論均作如是釋也此破彼云汝所謂後念是否實有若謂後念假有既非唯識所許亦不能證成實有之自證分若是實有又非我許故若以後念為因而成立未成之自證分此所宣說後念之因尚未極成故不足為能立因縱許成立有自證憶彼之念亦非理他故如未知身生此因亦破諸差別此縱破後念亦即破自證也汝自證依後念為因而立後念不成故自證不成今縱許汝自證已成以自證為因而生後念亦復非理以自證分與彼後念是異體故設許自證分能生後念於已知者能引生後念於未知者應亦能引生彼念其為異體同故然現見慈氏所知近密不憶故汝說非理諸差別者謂與此類似之計執所謂能生因因果法一相續等此因謂是他故之因即以此是異體故之因能通破上列諸計也由離能領受境識此他性念非我許故能憶念是我見此復是依世言說此答伏難唯識宗人難云汝不許自證引生後念汝中觀念心所云何生乎此答云觀待假生因前見境心故引後念因後念故知前見境二者互相觀待而有故我不許有離領受境識之他性異體後念然許假有憶念我見之念心所亦復是依世間言說許有憶念非許有自性後念也是故自證且非有汝依他起由何知作者作業作非一故彼自知不應理汝謂由自證分知有依他起又由後念證有自證分今後念既不成即自證分尚且非有由何知有依他起乎若謂由自證分自知有者不應道理能知所知之作用三者不應是一猶如能作所作與作用不應是一也若既不生復無知謂有依他起自性石女兒亦何害汝由何謂此不應有總結破依他起上文既破自生他生故依他起不生此又破自證分故依他起無因能知既不能生亦不能知而汝強謂有依他起似此無理妄執汝何妨謂石女兒亦實有何故汝謂石女兒不應有耶若時都無依他起云何得有世俗因如他由著實物故世間建立皆破壞出離龍猛論師道更無寂滅正方便彼失世俗及真諦失此不能得解脫此二頌出彼破世俗諦過唯識宗謂要有實依他起性始有世俗假法施設名言所依今既無實依他起唯識宗世俗諦以何為因而立以是之故他唯識宗由執實有內識依他起性故轉致一切世間共許名言安立假法皆不得成適以破壞世俗諦也龍猛論師以勝義無自性世俗有因果安立二諦為斷煩惱證解脫之正方便今唯識宗人出於龍猛正軌既失俗諦亦失真諦何由得解脫乎由名言諦為方便勝義諦是方便生不知分別此二諦由邪分別入歧途上二句釋自安立世俗諦之理下二句顯唯識宗之失於勝義雖一切無自性然要通達緣起方能通達性空亦要由世俗諦名言為方便方能通達勝義諦故名言諦為方便勝義諦為方便所生果唯識宗人不善巧分別此二諦理由執心實有境全無之邪分別出離正道入於歧途如汝所計依他事我不許有彼世俗果故此等雖非有我依世間說為有此破伏難顯自宗所立世俗諦異唯識宗唯識宗人既觀破訖不能成立彼宗乃轉難中觀宗云如我依他起不成汝之世俗諦亦應不成故此答彼云如汝唯識宗所計實有自性之依他起我不許有如是之世俗諦我所說此等世俗諦雖無自性然衆生無始習見為有為不壞名言成解脫果故我依世間亦說為有如斷諸蘊入寂滅諸阿羅漢皆非有若於世間亦皆無則我依世不說有此顯我說世俗有唯依世間說也若世間皆如阿羅漢已斷諸蘊入寂滅涅槃無世間現見一切相則我依世間亦不說有世俗諦也若世於汝無妨害當待世間而破此汝可先與世間諍後有力者我當依此顯彼破世俗犯世間相違我不犯也謂中觀說依他起無自性觀待勝義有而說不與世俗相關故決無世間相違之過若汝唯識宗觀待世間而破世俗諦決犯世間相違之過若汝不犯世間相違當可依世間而破世俗諦我無始以來正為不能破此世俗諦流轉生死汝試先共世間諍論最後若汝有力能勝我當從汝以我正求破此世俗諦故然汝決犯世間相違故我不從汝汝不能破我世俗諦也現前菩薩已現證通達三有唯是識是破常我作者故彼知作者唯是心此通華嚴經義顯己宗無違教失也華嚴經說現前地菩薩通達三有唯識者是破外道所執常我作者說彼六地菩薩知作者唯是心唯字簡外道所執常我等非簡外境也故為增長智者慧遍智曾於楞伽經以摧外道高山峯此語金剛解彼義各如彼彼諸論中外道說數取趣等佛見彼等非作者說作世者唯是心此以楞伽經證華嚴經所說唯心是破外道作者也楞伽經有頌云餘說數取趣蘊相續緣塵自性自在等我說唯是心餘謂外道等佛說彼所執一切造作世間之因皆非世間作者唯心乃為世間作者此間第二頌即引楞伽頌文意也高山峰喻外道邪執金剛喻佛語金剛杵能摧大山故此楞伽經頌文亦可解彼華嚴經義為令已解華嚴所說唯心者更增智慧故再引佛於楞伽所說以證華嚴說唯心是破外道作者非破外色也如覺真理說名佛如是唯心最主要經說世間唯是心故此破色非經義此釋唯心語有省文謂具足應說世間唯心最主要以是作者故說唯心者乃將最主要三字省去而說喻如佛是覺悟之義覺悟真理者名佛說佛即將真理二字省去也故唯識宗以此所說唯心為破外色非經義也若知此等唯有心故破離心外色者何故如來於彼經復說心從癡業生此反難彼也若如汝說佛知一切法唯有心故說唯心是破離心外色者何故如來即於華嚴經中復說心從癡及業生如六地說十二因緣說無明緣行行緣識等何不唯說識支要並說其餘十一支何用又識必待無明行等顛倒因緣乃生無緣則不生故亦當知非有自性也有情世間器世間種種差別由心立經說衆生從業生心已斷者業非有此釋唯心為主要之義也寶積經說隨有情業力應時起黑山如地獄天宮有劍林寶樹此即世間種種差別以心為主之義亦即心為作者之義故佛說唯心在破離心之作者非破離心之色法喻如兩王爭奪王位勝者唯放逐國王而自統治其人民並不將國內人民驅除作者之地位喻如王位心外餘一切法喻如人民也若謂雖許有色法然非如心為作者則遮離心餘作者非是遮遣此色法此破彼轉計經雖許有色法然不許色如心能為作者故說唯心意仍簡色上二句牒彼計下二句破云如汝所謂則唯字之義仍在遮離心之色法非是作者並非遮此離心色法言彼是無也若謂安住世間理世間五蘊皆是有若許現起真實智行者五蘊皆非有此總結色心俱有俱無不可說無境唯心也就世間理五蘊色心皆有就現起真實智之行者所見五蘊色心皆無無色不應執有心有心不可執無色般若經中佛俱遮彼等對法俱說有此引教證也若說無色心亦應無般若經中佛說色心俱自性空故若說有心色亦應有俱舍集論等說五蘊俱有故二諦次第縱破壞汝物已遮終不成由是次第知諸法真實不生世間生上二句總非彼執下二句總成此宗汝物謂汝所執識汝所執識已為我破遮終不能成汝雖不恤壞二諦以種種計執來救亦是徒勞由上推察之理是以成立我宗知諸法就勝義諦一切無生就世俗諦一切生經說外境悉非有唯心變為種種事是於貪著妙色者為遮色故非了義此下四頌釋經說唯識是不了義教唯識宗人若難云楞伽經云外境悉非有心變種種相似身受用處故我說唯心此明言無外境唯心變汝說顯與楞伽聖教相違此答彼云即於楞伽經中復有頌云如對諸病者醫生給衆藥如是對有情佛亦說唯心即彼經亦已自說唯心之教乃是對治有情隨機施教方便而說非了義教也由對貪著妙色有情為治彼貪著說色非有遮彼所貪著色境故說唯心非說實無色境唯有實心也佛說此是不了義此非了義理亦成如是行相諸餘經此教亦顯不了義依教已證唯識是不了義依理亦然其理如次頌所說以此例餘與此相似之經如解深密說阿陀那識甚深細一切種子如瀑流我於凡愚不開演恐彼分別執為我又說三性三無性等皆由楞伽之教可顯是不了義佛說所知若非有則亦易除諸能知由無所知即遮知是故佛先遮所知此釋其理佛說所知境無衆生若了達境無依此修行久久亦能自悟既無外境云何得有內心由佛說無所知境時即含有遮能知心之義故佛先遮所知境究竟於能知之心亦遮也故知唯遮境者是不了義教俱說性空方是了義如是了知教規已凡經所說非真義應知不了而解釋說空性者是了義總結了不了義差別既知佛教之儀則如此應知諸經偏就世俗諦而說者是不了義說一切法自性空者方是了義教也計從共生亦非理俱犯已說衆過故此非世間非真實各生未成況共生第三破共生計共生者如印度尼乾子外道等計執尼乾子以九句義解釋宇宙謂命非命法善業非法惡業等命謂命根為有情本體常住相續通前後世約等於數論之神我有情從命根生為自生又要由善惡業及父母等因方能生故亦是他生無情界如芽從種生是自生從水土日光是他生故有情無情一切法皆自他二因共生但從自生有常生及因果無別等過但從他生有一切生一切等過共生應無二過此破彼云汝之共生從自生之一分有自生之衆過從他生之一分有他生之衆過上說自生他生諸過俱為汝共生所犯再者世間現見一粒沙不能出油千萬粒沙中亦不出油即見各各不能生者合亦不能生汝謂自他各不生合則能生既違真實亦違世間二諦俱不許也自生他生各各尚不成何況自他共生乎若計無因而有生一切恆從一切生世間為求果實故不應多門收集種第四破無因生計無因生者如印度斷見外道順世外道主張無前世後世以非所見故彼謂一切法唯由四大微塵造成等於現代所謂原子然彼更將之滙為地水火風四大類也四大變化能起心之作用喻如酒唯由水米火候麴菌等變化則能令人醉發生心之昏沉掉舉等自然無因以彼不許有業報業報非所見故又現見無情界種種差別亦是無因如果非摶而圓葉非剪而尖花不染而紅雪不洗而白因此彼不許有造物主神我等以現有情無情一切無造作因故總之不許有因生以有因必有自生他生共生等過故因執自然無因而生以為如是則離彼諸過此宗之見最粗淺其過亦粗大易見經論中破此等見之處甚多瑜伽師地論有尋有伺地亦廣破此間但總略而出其過初句牒其計次句總出其過後二句就世間現見破佛法說諸法有因有二種理一者諸法無常剎那不住若無因果前法滅後後法不生諸法應成斷滅二者諸法差別定各有因若是無因應無差別以有因故種瓜得瓜種豆得豆善感樂報惡感苦報情非情界種種差別皆悉得成若諸法各各無因即不須決定之因一因應生一切果一切因應生一果總之即一切因可生一切果又無因之時亦應有果無因之地亦應有果即一類之果應處處常常生起充遍十方三世唯是一法諸法云何得成即不須因即可有果世間之人今年亦不須更留穀種明年田中自有稻生有是理乎衆生無因應無取猶如空花色與香繁華世間有可取知世有因如自心此以差別證有因也取謂可取差別相繁華言差別衆多衆生若無因應無差別相可見如空花無因亦無色香差別可見今現見衆生貧富苦樂智愚賢不肖衆多差別飛潜動植之類差別更復無量如豆種圓豆子亦圓麥種長麥子亦長可見由因不同而差別世間既有差別應知有因如自心者即以彼外道自心為喻破也汝執無因之心即因宗派知見而起即汝舉心動念莫不有因云何說一切無因也汝論所說四大種汝心所緣且非有汝意對此尚愚暗何能正知於他世此破彼執唯四大種進破無他世執彼謂四大種實有自性此有自性四大種於前破諸法有自性時已經破訖汝執為有彼實非有彼為汝心之所能緣汝對之尚且愚暗不達彼是緣生無性無常何況最極微細之他世乃聖人天眼通境非汝境界汝何能判斷乎且汝說無他世為未見說無為見無說無他世若無汝即不能現見以他世空是無為法不能為現量所緣故若空能為現量境虛空亦成有為矣若汝以比量成無他世汝又不許比量唯許現量為能立汝既現比二量均無從知他世無說他世無當是依汝未見而說汝所未見遂說為無別人若見應說為有汝一人之見云何能為標準若云他世定無我未見過如石女兒等於說云佛非一切智人能穿衣吃飯說話走路故如我及一切凡夫同一非理亦同說云佛亦非佛自稱一切智人故如過去某某仙人等如是說無阿羅漢無一切智無解脫無解脫道等均同此破破他世時汝自體於所知性成倒見由具彼見同依身如計大種有性時此以彼計大種是倒見例彼破他世亦是倒見所知性謂宇宙萬有量云汝破他世時見於所知性是顛倒見宗以具彼見同依之身故因如計大種有性見喻意謂計大種有自性者是汝自身破他世者亦汝自身汝計大種有自性既是倒見汝破他世亦應是倒見一既不可信餘亦不可信也大種非有前已說由前總破自他生共生及從無因生故無未說諸大種此釋計大種是倒見之理前總破有自性生已說一切法無自性大種在一切法內亦無自性既已成大種無自性今執有自性大種故是倒見不須更成也由無自他共無因故說諸法離自性世有厚癡同稠雲故諸境性顛倒現上二句總結諸法無自性生以有自性生於四種生必居其一今四種生不成故諸法無自性下二句答伏難或難云諸法既無自性因何衆生執有自性答由無始濃厚愚癡力故如稠雲覆不見天宇真象故諸境界似有自性顛倒顯現如由翳力倒執髮二月雀翎蜂蠅等如是無智由癡過以種種慧觀有為此舉喻也翳力喻無明力翳眼或見髮或見二月或有圓圈如孔雀翎眼或見黑點如蜂蠅等或見空花亂墜皆非有見有喻無自性見有自性無智凡夫以無明愚癡過患用種種邪慧觀察有為緣起之法無自性中見有自性亦猶如是說癡起業無癡滅唯使無智者了達慧日破除諸冥暗智者達空即解脫此答伏難謂或問言汝說緣生即無自性云何佛說十二因緣唯令衆生了達無我耶答曰不然佛說無明緣行等流轉之理又說無明滅故行滅等還滅之理若於鈍根者唯能令破我執於利根者亦能令彼即由此悟入性空以性空慧破無明暗即得解脫癡起業謂無明緣行無癡滅謂無無明則行滅也若謂諸法真實無則彼應如石女兒於名言中亦非有故彼定應自性有此外人反難也若謂諸法就勝義中無應於世俗中亦無無石女兒於勝義無於世俗亦無然諸法於名言中有不同石女兒故彼諸法定有自性有眩翳者所見境彼毛髮等皆不生汝且與彼而辨諍後責無明眩翳者此答彼難意謂無自性之法有畢竟無如石女兒等有非畢竟無如世間共許諸法譬如有眩翳者所見毛髮之境與石女兒同非實有然眩翳者唯見毛髮不見石女兒汝可先詰眩翳者何故唯見毛髮不見石女兒然後再詰責無明眩翳所惑衆生何故唯見山河大地不見石女兒汝若知眩翳者不可詰難即知世俗有者非定有自性也若見夢境尋香城陽焰幻事影像等既同不生非有性汝云何見應非理此進難彼自識所見若汝夢中見汝親屬或於海市蜃樓見有樓閣城闕或於幻事見象馬等或臨鏡時見汝影像此所見諸物即與石女兒同是不生無有自性云何汝不見石女兒唯見汝之親屬乃至唯見汝自身影耶是唯有質之於汝矣此於真實雖無生然不同於石女兒非是世間所見境故汝所言不決定此結出真實無世俗有也此宇宙萬有真實雖無自性生然是世間所見境不同石女兒故汝言真實無者名言亦無理不決定真實無者於名言中或有或無無者石女兒等有者因緣生法也如石女兒自性生真實世間俱非有如是諸法自性生真實世間皆悉無此反破彼諸法有自性生二諦俱無也如汝所說諸法自性生真實無故世間亦無如石女兒自性生於真實無於世間亦無也故佛宣說一切法本來寂靜離生性復是自性般涅槃以是知生恆非有此引佛語結出本來無生寂靜者謂無雜染佛說諸法無自性生故本來寂靜自性涅槃故知諸法決非自性生如說瓶等真實無世間共許亦容有應一切法皆如是故不同於石女兒前釋勝義無世俗許有是對一般人而言今專對小乘人說也瓶衣等物小乘亦許真實無名言有故一切法亦真實無名言有不同石女兒真實無名言亦無也諸法非是無因生非由自在等因生非自他生非共生故知唯是依緣生此總結歸緣生也諸法非自生他生共生無因生更非由大自在等邪因生大自在若先能造衆生今時何不見彼造衆生衆生若由彼造自作之業則無用衆生由大自在所造大自在復由誰造若復有造大自在者由他所造則非自在且能造復有能造是則無窮若大自在不待他造衆生亦不待大自在造故如是邪因非有然月稱論師亦不許無世間現見生故說應許因緣和合無自性之生由說諸法依緣生非諸分別能觀察是故以此緣起理能破一切惡見網此下五頌釋通達緣生之功德最大者即為無邪分別知緣生故知無自性即非一異自他等分別所能觀察故能破一切常斷等惡見網有性乃生諸分別已觀自性咸非有無性彼等即不生譬如無薪則無火此頌釋成分別不生以有自性始起自生他生共生無因生邪因生等邪分別由緣起理觀察已知一切法咸無自性以無自性故彼等分別所依之基礎即根本鏟除故分別不生如無薪則火不生薪喻執自性火喻諸自他等分別異生皆被分別縛能滅分別即解脫智者說滅諸分別即是觀察所得果此進顯滅分別之利益衆生由邪分別執著諸法始起貪嗔流轉生死分別為繩能縛衆生能滅分別即無煩惱而得解脫龍樹等地上菩薩說由觀察緣生滅諸分別即所欲證之果故說緣生之理論中觀察非好諍為解脫故顯真理若由解釋真實義他宗破壞亦無咎此更進顯造論所為中論二十七品以一異等觀察世出世間諸法皆無自性意在破執諸法實有之見非破彼法由大悲心為令衆生得解脫故顯示真理非為顯己智慧辨才而好諍也或謂汝雖自言不好諍而盡破他宗獨揚己宗豈非好諍此答彼云以彼邪執為真理障欲顯真理彼如蔓草擋路不得不除故破他宗亦無好諍之咎也若於自見起愛著及嗔他見即分別是故若能除貪嗔觀察速當得解脫此顯自宗非虛妄分別虛妄分別者由於愛著自見此我所學我師所授則堅持不捨非我所學以違我故則於彼起嗔任意誹撥既有成見在中故不辨是理非理而成虛妄顛倒之計執若能除門戶之見於自宗無貪於他宗無嗔方能平心靜氣唯依真理觀察由此始能速見真理斷煩惱得解脫自彼非彼生豈從他等至此破法我執竟慧見煩惱諸過患皆從薩迦耶見生由了知我是彼境故瑜伽師先破我此下抉擇人無我此一頌顯何故破我薩迦耶見如初地中釋即是我見六地菩薩有智慧者見貪嗔癡慢等煩惱及其引生生死中三苦八苦無量諸苦之過患皆由我見而起由有我故自他分別趨樂避苦利己損人若無我執則舉世皆成大阿羅漢矣既知我執為繫縛之因即知欲求解脫應以此為下手處所對治目標然此我執既非色法不可椎之令破如碎瓶瓮亦不可拔之令出如剜針刺我執唯是自心自心云何可以去除耶以是之故必須觀察我如何生起然後能知對治之法如知人必飲食始能長養斷其飲食彼自然不能生存長養我執者即其所緣之我我為彼我執所緣之境是彼所依若能破我壞其所依我執即滅故修行人第一先破我然佛亦不說畢竟無我唯說非實有我我若實有我執即無法對治解脫亦決不可得若抉擇究竟知實無所執之我即知必能得解脫矣外計受者常法我無德無作非作者依彼少分差別義諸外道類成多派此下抉擇我執所緣境自此頌下五頌破離蘊我為我執境印度外道中除斷見外道而外皆許業果通三世斷見外道謂我與身俱存亡等於說色蘊是我其餘外道皆計離蘊我以色身生不俱來死不俱去現見人死則軀體壞滅故色蘊不能通三世受等四蘊對境則生緣不會則不生既非常住亦不能通三世故必有離蘊之我以身為旅舍從生至生為造業受果之生此一頌出諸外道計執最基本者為數論外道其計執在抉擇法無我時已述之唯上文重在破其自性此處重在破其神我故更出其所計神我彼所計神我有五種條件一是受者能享受苦樂二是常法能通三世常住不變三無喜憂暗三德四無作遍一切處故五非作者不造業故其餘勝論外道計我有德是作者以及諸派外道所計神我之條件雖稍有差別而謂離蘊常住有自在則大體相同如石女兒不生故彼所計我皆非有此亦非是我執依不許世俗中有此此一頌破常我彼諸外道所計常我皆非實有以不生故如石女兒若常應不生若生應無常也況此所計之離蘊我縱有亦非衆生我執所依以世間亦不許有具足此等荒謬條件之我故由於彼彼諸論中外道所計我差別自許不生因盡破故彼差別皆非有此進破受者等差別也彼各家外道論中所計我是受者非受者是作者非作者種種差別由彼共許是常常則不生以不生故為因能盡破一切差別皆不得成要有我方有差別我既不生猶如兔角何從論其長短黑白乎是故離蘊無異我離蘊無我可取故不許為世我執依不了亦起我見故此就世間現見破也我若即色蘊則有形可見我若即受等則可以經驗若於色心之外求我則不可得是故無汝所執離蘊異體之我世人不知神我種種條件者亦起我執可見神我非世人我執所依有生傍生經多劫彼亦未見常不生然猶見彼有我執故離五蘊全無我此破伏救也彼或救云世人由他生曾習知神我故因此亦緣神我而執我此破彼云如蟲蟻等亦怖畏死可見傍生亦有我執彼極愚癡何嘗見有常住不生之神我若謂他生曾習經傍生中多劫流轉者曾習亦應已忘失何故皆執有我可見我執非緣離蘊之我也由離諸蘊無我故我見所緣唯是蘊有計我見依五蘊有計唯是依一心此下破即蘊我佛弟子皆不許有實我亦不許我執緣離蘊境起唯犢子部說我見緣不可說之實法彼法不可說常無常不可說與諸蘊一異故名不可說其餘諸小乘多說我見依五蘊起有時在高險處將欲傾墜矍然而驚謂將無傷我是即執色蘊為我有時謂我能感覺設想計劃我有智慧即執受等蘊為我如阿含云若諸沙門若婆羅門所起我見皆唯見五取蘊彼即引此證五蘊是我後見色蘊不通三世三界又斷身肢時我不成二燃指之時非我被燒故色蘊非我心能作業為生死主故唯許心為我引經云能調伏心即得生天又云調伏我得善趣天即善趣證明心是我見所緣有部經部唯識及中觀清辨派皆許我執緣心法起然受等四蘊中前三有時間斷復不自在故不許心所是我唯許心王是我執依又於識蘊中前五識亦常間斷故唯許意識是我執依於唯識宗則說有第七識緣第八識執以為我清辨則謂第六識恆常剎那相續為前後世業感所依為我執所緣凡此皆即蘊我也此出計即蘊我諸家之計大別為二一即五蘊我二即一心為我若謂五蘊即是我由蘊多故我應多其我復應成實物我見緣物應非倒此破即五蘊我一我即五蘊蘊有五我應成五極不應理二小乘許五蘊是實有我亦應成實有然彼兩派佛弟子皆不許我實有故不應理三我若實有我見應非顛倒以於實有者見為實有故我見若非顛倒因我見而起之貪嗔等亦應非顛倒是故成大過失計一心為我亦犯此三過一心有多剎那我應成多二計心實有我亦應實有三我執緣實物應非顛倒不可斷除也般涅槃時我定斷般涅槃前諸剎那生滅無作故無果他所造業餘受果更出即蘊過也阿羅漢般涅槃時灰身泯智五蘊既斷我亦應斷先時實有後時斷無應成斷見又凡夫五蘊剎那生滅我亦應剎那生滅我有實體則前我與後我體應各別因此前我作事後我不應憶應無宿命通又前我滅業之作者已滅不應後我受果又若前我作業由後我受果亦可此人作業餘人受果均是異體故實一相續無過者前已觀察說其失故蘊與心皆非我世有邊等無記故初句牒救次句顯已破三句結非四句出拔十四無記過彼救云前後我是一相續故無此作彼受之過此答云無自性可許假一相續有自性相續不成前抉擇法無我時已說故五蘊非我心亦非我又若說我與五蘊一十四無記應不得有十四無記者有十四事不應記別謂世界有邊耶無邊耶亦有邊亦無邊耶非有邊非無邊耶世界常耶無常耶亦常亦無常耶非常非無常耶佛滅度後有耶無耶亦有亦無耶非有非無耶我與身一耶我與身異耶此十四問外道問佛佛置不答其所問世界意在神我神我本無何由分別常無常等若直答彼言如汝神我本來無有何由說常無常則彼又墜斷見故佛不答令其自知謬執生起慚愧根機成熟始可為說無我我非實有故不可說實有與蘊一異之我出世法中執實有如來亦是顛倒中論觀如來品所釋故亦不可說汝如來般涅槃後實有實無如根機成熟者亦可為說無我之義如龍軍論師答國王問國王問龍軍我常無常龍軍轉問王大王宮中橘樹之果為酸為甜王謂我宮本無橘樹何以說其酸甜論師答云本來無我何以說常無常耶王因此悟入故佛不答此十四問者以其問不應理其機復不應答故如四百論云或謂佛不答此十四問非一切智此十四問不應答佛即不答正足見是一切智此十四無記小乘共許正量部中比丘若說此十四句即應驅拼尤垂為厲禁今若說即蘊是我即非不可記也若汝瑜伽見無我爾時定見無諸法若謂爾時無常我則汝心蘊非是我小乘共許修行真見道時於苦諦四相中見法無我若五蘊是我應見無五蘊然汝許五蘊有自性見無五蘊應是斷見若謂見道所見無我乃見無外道所執常我非見無五蘊則我執所緣之境應是常我而非五蘊或識蘊也汝宗瑜伽見無我不達色等真實義緣色轉故生貪等以未達彼本性故若如汝所許修行人證見道時見無常我則與色等無關以未達色等真實性故仍應緣色等起煩惱然真見道時不應起煩惱是故非理若謂佛說蘊是我故計諸蘊為我者彼唯破除離蘊我餘經說色非我故由餘經說色非我受想諸行皆非我說識亦非是我故略標非許蘊為我上二句牒小乘引經難後六句釋通阿含云若諸沙門若婆羅門所有我執當知皆緣五取蘊起彼引此以證佛說五蘊是我說五蘊非我有違經失如何會通此釋云佛說我執緣五蘊起唯為破外道離蘊有之計執餘處經復云色非我受非我等可見佛說我執依蘊起非許我即五蘊上文但為略標故總云我執依蘊起未加簡別餘處方廣釋也經說諸蘊是我時是諸蘊聚非蘊體非依非調非證者由彼無故亦非聚此一頌縱破也初句縱次句奪末二句進破蘊聚亦非我縱許經說諸蘊是我亦唯應指諸蘊和合積聚假體為我非說一一蘊自體以有上說諸過故然經又說我自為皈依能調伏我則生善趣我作善惡我為證者汝計實有所依所調及能證者彼蘊聚無體唯假和合非是實有故蘊聚亦非我爾時支聚應名車以車與我相等故經說依心諸蘊立故唯蘊聚非是我上二句破伏救彼若救云諸蘊聚積即成實我可為證者等此難彼云若積蘊即成我積車之支分如輪軸轅轄等堆叠一處應即成車二相等故下二句帶出自宗謂經說我依五蘊應唯許依五蘊聚積假立為我非五蘊即我不可以所依作能依故若謂是形色乃有汝應唯說色是我心等諸聚應非我彼等非有形狀故初四字牒彼救下破若謂聚積非車車形是車蘊聚非我聚形是我形要色蘊乃有汝應唯說色蘊是我餘諸蘊皆非我以彼諸蘊無形狀故取者取一不應理業與作者亦應一若謂有業無作者不然離作者無業汝許我造業能取諸蘊我為能取蘊為所取我與蘊一是取者與所取為一作者與所作業應為一陶師與瓶盆亦應為一因果則亂且我亦不許無能作之我唯有所作之業以離作者無所作業故業及作者唯是相互觀待假名為業假名作者一壞則俱壞故佛說依於地水火風識空等六種界及依眼等六觸處假名安立以為我說依心心所立我故非彼等即是我彼等積聚亦非我故彼非是我執境此出自宗許假立我破即蘊我如寶積經父子相見會云造業受果之我依六界六觸處及十八意近行等假名安立說依心心所安立為我非心心所一一法即我亦非心心所之積聚即我故心心所若總若別皆非我執所緣境證無我時斷常我不許此是我執依故云了知無常我永斷我執最希有若汝不許常我是我執依唯許五蘊是我執依又云見道時斷常我即斷依五蘊而起之我執是誠從來未有之荒謬理論也見自室壁有蛇居云此無象除其怖倘此亦能除蛇畏噫嘻誠為他所笑此喻顯可笑也畏室有蛇知室無蛇方能除怖若但為說無象云何除彼怖蛇之念若說無象欲除畏蛇之心是誠世間可笑之事蛇喻依五蘊執我象喻依常我執我為除依蘊我執而斷除離蘊常我藥不對症同一可笑也於諸蘊中無有我我中亦非有諸蘊若有異性乃有此無異故此唯分別此一頌破相依也謂若我依五蘊有我應在蘊中如人在帳中五蘊依我有應五蘊在我中如果在器中我與蘊應有各各異體可見今蘊中無我我中無蘊覓之了不可得若各有異體性乃有此相依之事如茶杯依桌今無異體故所謂相依唯是虛妄分別也我非有色由我無是故全無具有義異如有牛亦如色我色俱無一異性此破相屬也若謂有我色蘊等為即蘊者此亦不然我尚且無有彼云何能具有他法如五蘊等且縱許我能有五蘊為如人有牛之有為如人有好顏色之有如人有牛則我與五蘊異體如人有好顏色則我與蘊一體異體俱不可說如上已破故不應說以我有蘊為即蘊我非有色色非我色中無我我無色當知四相通諸蘊是為二十種我見由證無我金剛杵摧我見山同壞者謂依薩迦耶見山所有如是衆高峯此總結我執數也我非有色者謂非蘊屬我也色非我者謂蘊非與我一體也色中無我者謂我非依蘊也我無色者謂蘊非依我也如是四相通於五蘊故有二十種我見此唯就世人說也若就外道說加離五蘊我應有二十五種我見無明地上我見之山日日增長依我見山分出此二十高峰見道之時由證無我以金剛智杵摧我見山此二十見如衆高峰亦同時摧壞有計不可說一異常無常等實有我復是六識之所識亦是我執所緣事此出犢子部等計也彼計我是實有不可說常無常等亦不可說與蘊一異以許前五識亦起我執故謂彼是六識俱緣之境亦即我執所緣境不許心色不可說實物皆非不可說若謂我是實有物如心應非不可說此一頌破我是實有應非不可說俱舍破我品注中有廣破文此但略破汝所計我應非不可說汝許是實有故如汝許色心等實不許色心等是不可說許我實有應亦非不可說也喻如心等如汝謂瓶非實物則與色等不可說我與諸蘊既叵說故不應計自性有此一頌立我是假有汝所計我非自性有不可說與蘊一異故如瓶汝許與色等不可說一異亦許非實有汝識不許與自異而許異於色等法實法唯見彼二相離實法故我非有汝許識蘊是實法不與自體異就是即蘊又許異於色等法就是離蘊實法唯有即蘊離蘊二相汝所執我即蘊離蘊上文俱已破訖離實法二相故我非有故我執依非實法不離五蘊不即蘊非諸蘊依非有蘊此依諸蘊得成立結出自宗由上已破諸計故知我執所依必非實法非離蘊非即蘊非依蘊非蘊所依非能有諸蘊唯有依諸蘊積聚假有之我為我執所依如不許車異支分亦非不異非有支不依支分非支依非唯積聚復非形此以車喻顯七相推求我不可得車喻我車之支分車箱車軸等喻五蘊依箱輪軸等假立為車一不許車異支分者喻不許離蘊我離箱輪軸等車不可得故二亦非不異者謂車與輪軸等亦非完全是一喻不許我與蘊一車與輪軸一車體應成多故不應理三非有支者謂若車有實體即不能有輪軸等非實有車才能有輪軸喻無實我能有五蘊四不依支分者謂無實車依於輪軸喻無實我依於五蘊五非支依者謂非有實車為輪軸所依喻無實我為五蘊所依六非唯積聚者非唯輪軸縱橫堆積一處便生車體喻非五蘊聚積便生實我七非形者謂非唯輪軸積聚有如是形便為實車喻非五蘊和合形相便為實我此七相中前五相前已破訖後二相前唯略破下當廣釋若謂積聚即是車散支堆積車應有由離有支則無支唯形為車亦非理上三句破積聚下一句破形初句牒彼計次句顯非理第三句破計支分實有若謂輪軸積聚即是車以車箱輪軸等支分散亂堆積應即成車然實不爾故不應以積聚名車彼轉計云散亂積聚之輪軸等雖不名車然是車之支分車雖無車之支分有此答彼云若尚無車云何得有車之支分如無有人云何得有彼人之支分乎能有所有相待而立若說支分必有整體若人生平從未見車未見車之圖形亦從未聞人說車之形狀彼見輪軸等時必不能知即是車之支分唯見輪為圓圈軸為長棍各為另一整體之物與車無關也有支者即整體謂能有支分故由無有支則亦無支故計唯支積聚為車不應道理唯形為車亦非理者總顯其非次當廣釋汝形各支先已有造成車時仍如舊如散支中無有車車於現在亦非有若許以形為車此形為各各支分之形為支分積聚之形是各各支分之形者為是支分之原形為在積聚後有新形耶若許此形依未積聚前各各支分原形即是此頌所破汝所計為車之形若各各支分中未積聚前已有先應可見然未成車時輪唯是輪形無有車形軸唯軸形亦無車形如是一一支分皆無車形造成車時各各支分形仍如舊汝此車形從何而得故知此車非有若謂現在車成時輪等別有異形者此應可取然非有是故唯形非是車此破轉計依積聚後之各各支分新形有車也上二句牒彼計第三句出過第四句結破若謂車成時即輪軸等積聚時各各支分有異於未積聚時之形狀生起即以此新形為車者若有此異形應可見然此積聚之支分與散置之支分實無異形可得既無實車形可得故不應說以形為車由汝積聚無所有彼形應非依支聚故以無所有為依此中云何能有形此破依支聚之形為車也若汝許此形依輪軸等之積聚不依各各輪軸者亦有過失汝許積聚即是假法無所有不可得無實體性以車若實有所依之形亦應實有實有之形不應依假有之積聚若積聚是假依彼之形亦應假依形之車尤應是假今謂依積聚假法而有形依此形而有實車顯見其不可也如汝許此假立義如是依於不實因能生自性不實果當知一切生皆爾此依彼轉計出自宗因果假立義也上來已破若謂形是實有不應依假有之積聚彼轉計云我若許此形是假應可依假積聚而有此答彼云若許依假積聚有假車形依此假形而有假車是即同我所許依無自性不真實之假因生無自性不真實之假果一切法皆假即一切形皆可許有一切法生起之因果皆可如是成立也有謂色等如是住便起瓶覺亦非理由無生故無色等故彼不應即是形此對小乘破彼計依極微有形也有謂指小乘人言彼云色等四大極微如陶師所造之形安住便能令人生起瓶覺衆生見此形便知此是瓶若擊為碎片則不名瓶可見所謂瓶即指積聚之形此破彼云由前破自性生時所說之理已知無實有自性之色等極微實色尚不可得更無實形故彼瓶不應即是色等極微積聚之形雖以七相推求彼真實世間俱非有若不觀察就世間依自支分可安立可為衆生說彼車名為有支及有分亦名作者與受者莫壞世間許世俗此二頌顯不壞世俗諦雖以七相推求車之自性真實理中無世間現見中亦無然若不觀察自性有無唯就世間名言共許依輪軸等支分仍可假名安立為車為衆生說此是車對於輪軸等支分亦可說彼為有支或有分就其有作用言亦可名作者就其為作用之對象言亦可名受者我許假名安立本來不違世間因汝執有自性始以真理觀察見自性空若汝謂性空壞世間世俗者其咎在汝不在我也然性空實不壞世間世俗如執有自性始違世間故我今勸汝莫壞世間所共許之世俗諦也七相都無復何有此有行者無所得彼亦速入真實義故如是許彼成立上三句顯達性空勝利末句顯不壞假有既以七相推求皆無車可得所執有自性之車復何所有此自性有之法修中觀行者既七相求之都無所得彼行者由無所得故即速悟入緣生性空之真實義以如是勝利故行者當依此觀察性空又由於觀察緣起性空時唯觀察自性之有無故就世間亦許彼一切因果成立若時其車且非有有支無故支亦無如車燒盡支亦毀慧燒有支更無支此特對小乘破其轉計也以彼雖知車無自性實執未除仍執輪軸應實有如將車拆卸仍有輪軸可得此輪軸不可即執為車之支分其理如前已說觀待有支始名為有支之各各支分整體既無即無整體之各部如燒車盡輪軸亦無於慧火觀察既無整體之實車即無各部之實輪軸也如是世間所共許依止蘊界及六處亦許我為能取者所取為業此作者此以法合喻也如上依世間共許許有依輪軸假安立之車今亦依五蘊等許有假安立之我對所取五蘊名能取者若以業為所執此我觀待所取業亦名能取者若以業為所造此我觀待所造業亦名能作者非有性故此非堅亦非不堅非生滅此亦非有常等性一性異性均非有以我無自性故不可說堅不堅亦堅亦不堅非堅非不堅堅即常義如是生滅常無常一異等性各各四句亦均非有以無自性故所謂生滅等指有自性之生滅假生滅仍許有也有自性之生即是常有自性之滅即是斷以無自性故生滅斷常等均不可執故不落一切邊執也衆生恆緣起我執於彼所上起我所當知此我由愚癡不觀世許而成立衆生無始恆緣彼無自性之假我起實我執於彼所屬之法起我所執如於五蘊執為實有我之五蘊是也須知此我乃由愚癡未觀察自性有無唯依世間共許執為實有也由無作者則無業故離我時無我所若見我我所皆空諸瑜伽師得解脫此所執我所由無我故彼亦應無以無作者則無所作業故若見我我所皆空如證初果時自知往昔所執皆是顛倒由是不復造業斷流轉因到生死邊故得解脫瓶衣帳軍林鬘樹舍宅小車旅舍等應知皆如衆生說由佛不與世諍故此頌列舉一切聚積假物世許有者佛亦許有瓶為泥聚衣為縷聚林為木聚鬘為珠聚等其整體與支分均觀待而有自性雖空作用不無佛隨順世間世間說瓶佛亦說瓶不說泥聚衆生說衣佛亦說衣不說縷聚唯衆生執實佛見假有是不同耳故知佛不破世間中觀亦不破世間若世間皆見有外境而不許有外境乃壞世間也功德支貪相薪等有德支貪所相火如觀察車七相無由餘世間共許有此頌顯觀待假有一切可許功德謂差別相其所差別之物謂之有德第二句有字通於下支字及貪字有支謂整體有貪謂起貪之有情如是德與有德支與有支貪與有貪能相與所相能燒與所燒皆觀待假立若求其自性如觀察車之自性七相觀察皆無自性若不觀察由世間共許皆可許有因能生果乃為因若不生果則非因果若有因乃得生當說何先誰從誰此顯因果相待假立待果成因待因有果此因果二法若有自性為因從果有耶為果從因有耶若先唯有果復何待於因若先唯有因云何能生果且無果之時因為誰之因乎若因果合而生果一故因果應無異不合因非因無別離二亦無餘可計若因果有自性為因果合在一時一處而生果為因果不同時不同處而生果若因果合同在一時一處則因果成為一體若因果不合而生則互無關係他處他時之種亦能生此處此時之芽則因與非因無別除合不合而外更無第三種方式若計因果一分合一分不合合之一分有合生之過不合一分有不合生之過亦不成也因不生果則無果離果則因應無因此二如幻我無失世間諸法亦得有此明自宗所許因果外人問云汝中觀因果云何立耶答云離因無果離果亦無由立因我許此因果二法唯觀待假立如同幻事不執有自性故我無汝所犯諸過失而世間因果亦得不壞能破所破合不合此過於汝寧非有汝語唯壞汝自宗故汝不能破所破自語同犯似能破無理而破一切法故汝非是善士許汝是無宗破法人此外人反難也汝今破我所立因果以合不合徵難我今亦以此二端徵汝汝能破之理與所破之因果為合為不合若合則能破所破成一云何汝能破我若不合則亦不能破若不合而能破則一切能破一切故不應許此合不合之過若於我有汝豈非有汝語既自犯過故不能破我唯壞汝自宗自墮負處如兩造諍訟原告說被告之過若所說不實原告當墮負處汝中觀破我之語同犯合不合過故是似能破不能破所破之因果也汝既無能破之理而謗一切法皆空故非一切有正知見善士所許汝自不立宗唯破他所立法故是無宗破法之人無理之義復有別釋謂汝說合則因果成一不合則因果混亂此說無理以現見諸法不必相合而有因果如磁石吸鐵在磁力所及範圍內即能相吸非相合而吸亦非一切不合者皆相吸也又眼見色眼力所及則見非眼色合而見亦非一切不合者皆見也因能生果亦猶如是非合而生亦非一切不合者皆生能生者則生也前說能破與所破為合不合諸過失誰定有宗乃有過我無此宗故無失此答彼難也汝前說能破所破合不合諸過要於立有自性之宗乃有此過以汝執有自性因果乃可以合不合之理觀察若我於能破所破並不執有自性故不可以合不合觀察即無此過以假立能破破假所破破之作用得成亦無合不合過也如日輪有蝕等別於影像上亦能見日影合否皆非理然是名言依緣生此一頌以喻顯無自性之因果雖不可說合不合而因果得成如日蝕時水中日影亦蝕日上有黑點水中日影亦有黑點如是因果宛然而不可說日與水中之影是合非合由世人皆知水中日影是假法故共許此影依空中之日地上之水等諸緣而生亦不徵求其合不合也如為修飾面容故影雖不實而有用如是此因雖非實能淨慧面亦達宗此一頌喻顯假法亦有作用也如鏡中人影雖假然對鏡者可依此自見淨穢修飾其面故假影亦有作用因此之故我此能破之因雖非實有自性然能令衆生去無明垢淨空慧面亦能令達無自性宗能破所破雖俱無自性然此能破有能破彼所破之作用也若能了因是實有及所了宗有自性則可配此合等理非爾故汝唐劬勞此反顯外不能難我也能了宗者為因依所作性了聲無常故能了即因所了即宗也了謂通達由因之力能立能破通達彼宗為成不成也若我能破之因與所破汝之宗有自性者始可配此合不合之理而難我非爾者謂我不執有自性也我不執有自性汝以合不合之理為破不能破我徒勞無功也易達諸法無自性難使他知有自性汝復以惡分別網何為於此惱世間此詰外人何故捨易就難故惱世間也我說諸法無自性有汝共許之同法喻易於使汝通達如我說五蘊無自性緣生故如幻夢水月等此所舉喻汝亦許是緣生無自性也汝說諸法有自性則難使我通達以我不許一法有自性決無同法喻故如汝說五蘊有自性緣生故因有違宗之失同喻亦不可得任引何法為喻皆同所立我不許何法有自性也衆生由執有自性故流轉生死汝復患衆生繫縛不堅更立諸法有自性之計執以惡見之網惱亂世間若有自性之說易於成立汝為避難就易猶有可說今無自性之理易曉有自性之說難達汝何苦以此惱世間耶了知上說餘破已重破外答合等難云何而是破法人由此當知餘能破此總結也上說謂上來所說破人我法我之文餘謂觀因果合不合之文一解上說即指餘破謂彼二我之餘即破因果文重破外答謂觀能破所破合不合以下一段之文彼謂中觀是破法人此答彼云龍樹月稱破汝邪分別於無自性法中執實有法亦許緣起因果並非唯破他人所見真實有法自無所立云何是破法人耶上三句總結上文下一句例破也餘法能破者謂了知上文已盡破彼執當知餘有如是執者此理亦能破也一解餘能破謂了知上文所說之理龍樹餘處所說能破理由亦如此應當了知破人我法我竟無我為度生由人法分二佛復依所化分別說多種如是廣宣說十六空性已復略說為四亦許是大乘此下結出自宗真實義無我即無自性達無我理則能出生死佛為度生故說無我無我之理唯一以所依不同分為人無我法無我二種復依所化之機有樂廣者則開為十六空或有樂處中者又略說為四種空大般若經說此十六空即是大乘須菩提問云何是大乘佛答十六空即是大乘也由本性爾故眼由眼性空如是耳鼻舌身及意亦爾非常非壞故眼等內六法所有無自性是名為內空此下別釋十六空此釋內空也內謂六根內身所攝法空謂無自性此六根空性本來如是如火之熱性不由造作佛亦不過為衆生說明空性並非空之造作者眼自性空者由眼之自性本來是空不可詰其何故空也由無自性故非常本來性空非後斷滅始空故亦非斷非壞即非斷也由本性爾故色由色性空聲香味及觸並諸法亦爾色等無自性是名為外空此釋外空也外謂外六塵餘文如前可知二分無自性是名內外空此釋內外空也內外謂六根依處粗分色法是內外二分所攝故諸法無自性智者說名空復說此空性由空自性空空性之空性即說名空空為除執法者執空故宣說此釋空空也上空字指諸法無自性理下空字謂彼自性空也佛說一切法空衆生由執法習氣故既捨執法轉而執空佛說執空名不可化者然以大悲故於不可化者仍巧為施化為說空空此乃特對執空性實之衆生而說非對一切衆生說也由能遍一切情器世間故無量喻無邊故方名為大由是十方處由十方性空是名為大空為除大執說此釋大空也大謂十方十方名大有三義一遍一切情器世間故二修四無量時盡緣十方衆生以為無量之喻故三無邊際故執方者如外道勝論師以實德業大有同異和合六句攝諸法初實句義有九法謂地水火風空時方我意彼執方為實有此說大空對彼說也由是勝所為去聲涅槃名勝義彼由彼性空是名勝義空為除執法者執涅槃實有故知勝義者宣說勝義空此釋勝義空也勝義即涅槃是最殊勝所希求果故是勝所為又為最殊勝智之所知故或為所知法中最殊勝者故名曰勝義衆生觸處起執聞真如空性名曰涅槃又執涅槃實有故佛對彼說勝義空此中觀與唯識不同處唯識則不許圓成實無自性也三界衆緣生故說名有為彼由彼性空說名有為空此釋有為空也此處所說有為指三界有漏法緣生法皆名有為衆生執三界實有故為說空若無生住滅是法名無為彼由彼性空說名無為空此釋無為空也生住滅為有為三相無有為相即是無為有為有作用自性尚空無為無作用寧不空耶若法無究竟說名為畢竟彼由彼性空是為畢竟空此釋畢竟空也究竟名為邊際常究竟斷究竟即常邊斷邊畢竟即無二邊即是中道中道亦無自性名畢竟空由無初後際故說此生死名無初後際三有無去來如夢自性離故大論說彼名為無初際及無後際空此釋無際空也無際即生死生死無初際後際故三有即生死無際故無去來大論即大般若經解除衆生過失救護衆生名之為論以此義故論亦攝經生死自性空即無際空散謂有可放及有可棄捨無散謂無放都無可棄捨即彼無散法由無散性空由本性爾故說名無散空此釋無散空也諸法真理本無可取捨故名無散有為等法性都非諸聲聞獨覺與菩薩如來之所作故有為等性說名為本性彼由彼性空是為本性空此釋本性空也有為無為等法之本性即彼諸法之空性以非證空性者之所造作故曰本性十八界六觸彼所生六受若有色無色有為無為法如是一切法由彼性離空此釋一切法空也十八界等舉一切法之例也彼所生六受謂六觸所生受無色謂心法及不相應行法也離謂無自性也變礙等無性是名自相空此總標自相空也自相謂諸法別相如色之變礙相等色相謂變礙受是領納性想謂能取像行即能造作各別了知境此為識自相蘊自性謂苦界性如毒蛇佛說十二處是衆苦生門所有緣起法以和合為相此下別釋自相此三頌是境上諸法謂五蘊別別自相及蘊界處緣起相也施度謂能捨戒相無熱惱忍相謂不恚精進性無罪靜慮相能攝般若相無著六波羅密多經說相如是四靜慮無量及餘無色定正覺說彼等自相為無嗔三十七覺分自相能出離空由無所得遠離為自相無相為寂滅第三相謂苦無癡諸解脫相謂能解脫此五頌是行上諸法無罪謂止惡修善能攝謂能攝持心攝持功德無嗔為諸定自相者以有嗔尚不能得初禪故空等三解脫門空以本無所得自性遠離為相無相以無戲論分別為相第三無願解脫門以知三界苦及無顛倒執樂之愚癡為相八解脫以能解脫禪定等障為相經說善決擇是十力本性大師四無畏本性為堅定四無礙解相謂辨等無竭與衆生利益是名為大慈救護諸苦惱則是大悲心喜相謂極喜捨相名無雜許佛不共法共有十八種由彼不可奪不奪為自相一切種智智現見為自相餘智為少分不許名現見此五頌為果上諸法極喜謂見衆生樂最極隨喜無雜謂不雜貪嗔刀割香塗憎愛不起了達一切法之智名一切智智以於一切法真俗二諦一時悉見為相故名現見一切法餘聲聞菩薩之智唯見少分不名現見也若有為自相及無為自相彼由彼性空是為自相空此結自相空也上說諸法若蘊等有為法若三解脫門等無為法其自相各各自性空名自相空現在此不住去來皆非有彼中都無得說名不可得即彼不可得由彼自性離非常亦非壞是不可得空此釋不可得空也不可得者謂有為三相三世不可得現在不住不可得故過去已滅未來未生皆非有故即此不可得亦自性空名不可得空諸法從緣生無有和合性和合由彼空是為無性空此釋無性自性空也衆緣和合所生法無和合實性名為無性和合諸法即由和合諸法本性空名無性自性空釋十六空竟應知有性言是總說五蘊彼由彼性空說名有性空此下釋四空此釋有性空也有性為有為法謂五蘊等有作用法總言無性者是說無為法彼由彼性空名為無性空此釋無性空也無性謂無為法無作用故自性無有性說名自性空此性非他作故說名自性此釋自性空也諸法之無自性本來如是非他所作故亦名自性對他言自故即此諸法自性亦無有自性名自性空若諸佛出世若佛不出世一切法空性說名為他性實際與真如是為他性空此釋他性空也他者對生死言不達空性故流轉生死諸法空性離於生死名為他性宇宙真理恆常如是有佛不增無佛不減佛但為說明者而非造作者以諸法性常如其性真實不虛故名實際亦名真如空性亦空名他性空此四空即攝上十六空也般若波羅密廣作如是說總結此空理乃大般若經中佛金口親宣也如是慧光放光明遍達三有本無生如觀掌中庵摩勒由名言諦入滅定此總結六地慧度殊勝也庵摩勒果略似橄欖掌中觀果喻現前親證如是者由上觀察二無我理菩薩親證諸法無生之慧如日舒光遍照一切如觀掌中之果現見諸法真如即入滅定然於真空中亦無滅定可入故此乃由名言諦入滅定也雖常具足滅定心然恆悲念苦衆生此顯悲心殊勝雖常具親證真如之智慧然悲念衆生不墮斷滅不常住滅定中仍要出定作利生事業也此上復能以慧力勝過聲聞及獨覺此頌顯七地慧勝二乘以六地所證與七地能勝聲緣之慧作親因故此上謂此六地以上也世俗真實廣白翼鵝王引導衆生鵝復承善力風雲勢飛度諸佛德海岸此喻顯六地名現前之因也現前者謂六地菩薩有大力能速成佛一切佛法速現前故真實謂通達甚深諸法真理之智慧世俗者謂一切廣大福德資糧此二資糧喻如二翼鵝王喻六地菩薩廣白翼者廣喻福慧無量白喻無垢也善力風雲喻度生大願及一個半阿僧祇劫所積福德資糧菩薩由具此二資糧故速能飛度佛功德海而達佛果第七菩提心遠行地此遠行地於滅定剎那剎那能起入亦善熾然方便度上二句釋七地特勝之入滅定功德下一句釋七地特勝之方便波羅蜜多最為圓滿也名遠行者超出生死甚遠故生死有相此為無相行故有特別殊勝之方便故非魔力所能及故初地菩薩能剎那入百三摩地然七地以前均不能剎那入滅定以無相行與衆生無始串習相去懸遠故加行道時所觀真如乃是真如影像真見道時由加行道所緣影像為前導真見諸法實法以後地地修習入滅定時皆要先構造一真如影象作前方便乃能入定至七地時即不要此前方便欲入滅定於散亂心次一剎那即能直入方便度善熾然者謂由不執實有故能方便善巧成熟佛法饒益有情也方便之差別如瑜伽師地論廣說十方便等第八菩提心不動地數求勝前善根故大士當得不退轉入於第八不動地此地大願極清淨此出不動地名顯願波羅密圓滿也不動者謂不為煩惱動八地煩惱障斷盡斷德等同四果阿羅漢故又不為功用動七地名有功用行入滅定時尚須作意有微細功用方能入八地任運能入不為一切分別動故七地菩薩欲求勝前之善根數數修習入不動地從空定起能一時分身遍於微塵剎土承事諸佛饒益衆生以前二阿僧祇劫所修功德不如此一剎那譬如大船先在江河中須人牽挽其行甚緩今入大海乘風破浪一日能超往百年所行菩薩至此任運自可成佛決無退轉由無量大願以智慧方便之力皆能圓滿故能任運成就佛法饒益衆生諸佛勸導起滅定證八地時斷盡煩惱寂靜如阿羅漢入滅定時若非大願力之所攝持及諸佛諸大菩薩之警覺於一剎那即入無餘涅槃矣故經言一切菩薩證八地時定有十方諸佛前來彈指警覺令彼出定謂言汝今所證是無生法忍空三摩地誠為殊勝但諸佛三身四智十力四無畏等功德汝尚未得佛之依正身土汝尚未成汝一人得寂滅衆生尚流轉生死汝之本願尚未圓滿汝今所證小乘人亦能證得不因此便名大乘如是開示已八地菩薩即出滅定任運現身饒益衆生淨慧諸過不共故八地滅垢及根本已淨煩惱三界師不能得佛無邊德此顯八地斷淨煩惱障也淨慧謂智最清淨諸過不共謂不與諸煩惱過共住滅垢謂滅煩惱罪垢滅垢根本者謂滅微細法我執也三界師者堪為世間大福田也由於成佛尚須一大阿僧祇劫故佛之無邊功德尚未成就滅生而得十自在能於三有普現身此釋斷盡煩惱而能度生之理也空宗說煩惱障小乘初果開始斷四果斷完大乘初地開始斷七地斷盡始證八地八地以後尚有所知障成佛方能斷完所知障即是煩惱餘習煩惱斷盡氣味未盡如瓶中盛酥油油雖盡其氣味久洗不去又如木盒盛香香雖取出燒盡盒中香氣久久猶在煩惱斷後雖不起貪嗔而有無始慣習之餘習名所知障若不斷盡不能成佛此所知障小乘即不能斷如畢陵伽婆蹉由多生驕貴習氣故成阿羅漢猶喚恆河神為小婢舍利弗弟子多生為毒蛇嗔恨習氣故嚙樹即枯死此空宗所說所知障不同唯識唯識宗說小乘斷煩惱障與空宗同大乘人直往菩薩之煩惱障分別所起者初地斷完俱生煩惱障不斷唯地地各伏一分令其不為過失所伏俱生煩惱障分十一品初地至十地最後心伏完金剛喻定剎那頓斷至於俱生所知障即指俱生法我執亦分十一品自初地起地地各斷一品法我執及其眷屬至金剛道斷盡其所謂所知障空宗亦名為煩惱障唯識宗說菩薩煩惱伏而不斷者為要留惑潤生乃能受生入生死海度衆生故月稱不許此說者謂要煩惱障斷盡方能開始斷所知障故如瓶中酥油未取出必無法洗滌酥油之氣味故且華嚴經明云證八地菩薩若非諸神勸請第二剎那即入無餘涅槃若非煩惱障已斷完云何得入無餘涅槃耶唯識雖云若八地煩惱斷完不造業受生云何度生積資糧耶此答彼云雖已滅依煩惱而受之生然以得十自在故有受生自在及壽命自在可任意現身受意生身任意住世利益衆生也第九菩提心善慧地第九圓淨一切力亦得淨德無礙解此第九地唯說其超勝之功德也一切力具如華嚴廣說有十種力力波羅密圓滿清淨為九地特勝功德復得四無礙解清淨功德四無礙解謂法義詞辨十地經中有多門廣釋此略釋之法無礙解者謂於一一法門之名相通達無礙義無礙解者謂於諸法無量差別了知無礙辭無礙解者謂於諸國土天龍等趣一切語音言辭通達無礙辨才無礙者謂善開析諸法因果作用詞義相續不紊不竭第十菩提心法雲地十地從於十方佛得妙灌頂智增上佛子任運澍法雨生長衆善如大雲此釋法雲地名也法即佛法大法能作世出世間利益如雲能降大雨潤澤世間滿衆生願從十方佛得妙灌頂者謂十地菩薩入灌頂三摩地坐寶蓮花座上其花大如不可說微塵世界菩薩身量與座相等一一花葉上各有菩薩眷屬圍繞十方諸佛從眉間白毫各各放光集菩薩頂菩薩得灌頂已即成與佛同等之報身此灌頂名妙智灌頂此地亦名灌頂地也智增上者謂二諦悉能通達也勝義智見諸法空相唯是一相世俗智見無量差別相共相為一相故易知差別相無量故難知十地菩薩證真之智與佛相等說法度生之世俗智亦與佛等故曰智增上也唯不能雙照二諦故不如佛菩薩時能見百佛得佛加持亦能知此時住壽經百劫亦能證入前後際智能起入百三昧能動能照百世界神通教化百有情復能往遊百佛土能正思擇百法門佛子自身現百身一一身有百菩薩莊嚴圍繞為眷屬此三頌說初地菩薩十二類功德也菩薩功德實有無量於一剎那能任運成就者約要言之有十二種一於一剎那見百世界佛二能同時親近承事百佛得佛加持亦自知我得加持三以自福德力能任運住壽經百劫若以法力加持尚不止此四以宿命通能知過去百劫之事以天眼通能知未來百劫之事五一剎那中能出入百三摩地六百億日月為世界菩薩同時能震動百世界七同時能放光照百世界八以神通力能同時教化百有情各為應機說法九能一時遊百佛土十能同時思擇百種法門自能通達亦能開示令他通達十一自能現身到百世界十二一一身有百菩薩眷屬圍繞此皆就任運成就之功德而言數止於一百若力勵加行時功德尚不止此也如極喜地諸功德如是住於無垢地當得功德各千種餘五菩薩得百千得百俱胝千俱胝次得百千俱胝量後得俱胝那由他百轉千轉諸功德住不動地無分別證得量等百千轉三千大千佛世界極微塵數諸功德菩薩住於善慧地證得前說諸功德量等百萬阿僧祇大千世界微塵數此二地至九地之十二類功德也此十二類功德皆同初地而數量廣狹不同如初地一時見百佛二地一時見千佛皆以數為差別也二地之數為千餘五謂三至七地三地數為百千即十萬四地得百俱胝俱胝為千千即百萬五地得千俱胝六地得百千俱胝七地得百千俱胝那由他八地於無分別智得自在得百千佛世界微塵數功德九地得百萬阿僧祇世界微塵數阿僧祇為六十大數之一義為無數且說於此第十地所得一切諸功德量等超過言說境非言說境微塵數此十地所得功德數量且說者不止此德尚有下頌所述功德也不可說不可說轉是六十大數中最後一數超過言說境非言說境皆不可說義一一毛孔皆能現無量諸佛與菩薩如是剎那剎那頃亦現天人阿修羅此顯十地菩薩一一毛孔各有如是功德不唯自現無量身亦現諸佛菩薩身且剎那剎那各現入胎出世出家成道說法度生等無量不同之相且亦現天人修羅等六趣之相如觀音三十二應身隨衆生機而為示現釋佛地諸頌如淨虛空月光照生十力地復勤行於色界頂證靜位衆德究竟無與等此下顯佛果功德此正證佛果也上二句顯成佛因謂三大阿僧祇劫福智二資糧圓滿之十地菩薩智光徹見諸法所知障最極微細如淨空月無纖毫雲翳十力謂佛果十地為成佛親因故名生十力地於此再精進即成佛果成佛之處要在色界最高處摩醯首羅天十地菩薩即是摩醯首羅天王於彼天入金剛喻三昧斷盡所知障而成佛此與小乘所說不同小乘說佛證道定在南贍部洲菩提樹下等乃指化身佛示現成道而言大乘所說就報身佛言也證靜位者謂證佛果位靜者謂不起作意任運度生不思惟分別此是應度此不應度此時應度此時不應度自能應機施化也衆德究竟者謂一切功德圓滿無與等者謂唯佛與佛乃可相比餘無能及也如器有異空無別諸法雖別性無差是故正智同一味妙智剎那達所知此顯剎那頓成佛果也器喻世俗諦空喻勝義諦世俗諦中蘊界處等雖有千差萬別而勝義諦之無我性無有差別猶之瓶盆桌椅等物雖異而彼諸物之空無有差別正智謂正見法性無有顛倒之智慧以諸法無我性唯是一味故佛位微妙之一切種智於一剎那能通達宇宙萬有之真理所知即宇宙萬法也所謂成佛能頓成者即指與十地菩薩齊等之有情而言也若靜是實慧不轉不轉而知亦非理不知寧知成相違無知者誰為他說此外人難佛證靜也靜即寂滅性謂諸法實理寂靜離言無生無相不可思議既離言思智應不於上轉轉者生也謂智應不能於彼生起若智不緣彼而生又能知彼則不應理不知與知相違不知云何能知尚不能知無有知者云何而為衆生宣說諸法真理耶不生是實慧離生此緣彼相證實義如心有相知彼境依名言諦說為知此答慧可於靜轉也靜即不生不生是諸法真理慧即見其不生此佛慧即緣彼諸法真理而證真實義如眼識緣青色境有青色相現即說彼知青色此應成派許佛智亦有影相唯非同凡夫境界凡夫所現影相執為所緣法真相佛智影相與諸法實相無異不執為實是其不同然勝義諦中無能知所知對立之相故亦不可說知不知要於名言諦中方可安立為知也百福所感受用身化身虛空及餘物彼力發音說法性世間由此亦了真此答有能說者也經云曼殊師利應知不生不滅即如來增語法身既以法性為體故不能以言說宣示衆生然由三大阿僧祇劫六度萬行所感之受用身及所示現之化身能為衆生宣說法性乃至佛力加持虛空亦能發音說法如常啼菩薩志誠求大般若感得虛空發音為示方所加持餘物亦能說法如極樂世界水鳥樹林皆能說法但令機感相投盡虛空皆是善知識以佛充滿法界故以是之故法身雖離言說衆生由報身等發音亦可了知法性如具強力諸陶師經久極力轉機輪現前雖無功用力旋轉仍為瓶等因如是佛住法性身現前雖然無功用由衆生善與願力事業恆轉不思議此顯不加功用自能利生之理如勇健陶師經久極力旋轉機輪後雖放捨不用力旋轉不作功用然以前力所引勢力機輪自能旋轉仍為製瓶之因衆生善根喻如製瓶之泥佛往昔度生大願與三大阿僧祇劫精進修行之福德力喻如陶師經久旋轉機輪之力證法性身最極寂靜不作功用如陶師放捨機輪不復用力旋轉不作功用自能任運度生喻如機輪放捨之後自能旋轉製瓶也盡焚所知如乾薪諸佛法身最寂滅爾時不生亦不滅由心滅故唯身證此顯報身為能證也佛智如火盡焚一切戲論分別影相證法身時能證之智與所證之境合一所證之境既寂靜離言生滅俱不可說能證之智亦復如是既境智俱寂云何於名言諦中安立為證法身故唯依報身安立為證以報身始有色相可以詮說故此寂滅身無分別如如意樹摩尼珠衆生未空常利世離戲論者始能見此答云何利生之難也此身雖無分別不作功用然能隨機說法利益衆生如三十三天如意樹亦如龍王頂之摩尼珠隨衆生福業所感令五欲所需隨意自至彼樹與珠亦不作功用自有如是之力如是佛身亦不作功用恆常利生盡生死際然此身非凡夫所能見如阿彌陀佛白毫宛轉五須彌紺目澄清四大海一須彌尚非肉眼所見一海邊際尚非肉眼可得如是佛之身相凡夫云何可見若報身佛為衆生說法恐衆生聞之將如大風振耳無從辨其語義矣是故唯見道之菩薩乃見非凡夫見能仁於一等流身同時現諸本生事自生雖已久遷滅仍了無雜現一切此下九頌顯等流身功德等流身為報身示現與地上菩薩及聲聞說法之身又不同於八相示現之化身乃報身功德之所等流故曰等流身佛於一等流身同時可現往昔一切生中之事往昔之生雖久已遷滅然由果追因因力存在因位之力俱可於果位表現如華嚴經廣說何佛何剎能仁相諸佛身行威力等聲聞僧量如何行諸菩薩身若何等演說何法自若何如何聞法修何行作何布施供佛等於一身中能普現此釋一身現諸本生事舉一作布施為喻也謂作此布施於何佛世在何國土彼佛身相光明種姓云何修何種行具何威力聲聞弟子若干各修何行菩薩弟子若干身相若何演說何等之法謂三乘一乘等差別自身若何或生富貴家或生貧賤家乃至或生鹿象等畜生中以何因緣而得聞法所修何行以何物施施與何人經幾何時於一身中皆能普現如是持戒修忍進禪定智慧昔諸生彼等無餘一切行於一毛孔皆能現此例餘五度及餘諸行如修布施皆能顯現不唯於一身中顯現於一毛孔亦能顯現諸佛過去及未來現在盡於虛空際安住世間說正法救濟苦惱衆生者彼初發心至菩提一切諸行如己行由知諸法同幻性於一毛孔能頓現此顯三世諸佛從初發心乃至成佛一切諸行亦如己行能於一毛孔中同時頓現以了知諸法如幻之理故如是三世諸菩薩獨覺聲聞一切行及餘一切異生位一毛孔中皆頓現此顯不唯能現三世諸佛之本身事乃至一切菩薩獨覺聲聞異生之事亦能頓現此清淨行隨欲轉盡空世界現一塵一塵遍於無邊界世界不細塵不粗此顯空間大小無礙如此諸佛菩薩所行六波羅密等清淨功德皆能不作功用任運顯現自在無礙能令盡空世界現一塵中亦能令一微塵遍無邊世界此華嚴十玄門大小相容一多互攝之理也佛無分別盡來際一一剎那現衆行盡贍部洲一切塵猶不能及彼行數此顯時間三世無礙能以盡未來際衆行於一剎那同時顯現乃至盡未來際示現無礙也處非處智力如是業報智知種種勝解種種界智力知根勝劣智及知遍趣行靜慮解脫定等至等智力宿住隨念智如是死生智諸漏盡智力是謂十種力此總標十力也十力具足成就即是佛果此即以十力顯示佛果也彼法定從此因生知者說此為彼處違上非處無邊境智無礙著說名力此別釋處非處智力也處即因義彼法從此生或從此得即說此為彼法之因若布施為大富多財之因修三學斷煩惱是得解脫之因佛為現量證知者即說為處若彼法不從此法生不從此法得如作惡而求人天樂外道苦行而求解脫彼因不能得此果即說彼為非處是處非處於無邊處智無礙著皆悉能知乃名為力此處非處智力為總餘九為別愛與非愛違上相盡業及彼種種果智力無礙別別轉遍三世境是為力此別釋業異熟智力也愛業謂感樂果之業非愛謂感苦果之業違上謂雜業非純善業亦非純惡業也盡業謂斷盡生死之無漏業業果深細久遠之業雖大阿羅漢亦難徹見唯佛悉見無礙貪等生力之所發有劣中勝種種欲餘法所覆諸勝解智遍三世名為力此別釋種種勝解智力也衆生由貪等善不善心所之力發為種種不同之意樂勝解各有劣中勝三等差別此各各不同之勝解表現於外則人人能見然有時為他所映蔽覆藏則唯佛智始能見矣諸佛善巧界差別眼等本性說名界正等覺智無邊際遍諸界別說名力此別釋種種界智力也界謂本性眼等本性空無我性說名為界又界謂種姓空宗謂衆生同一種姓究竟成佛唯識則謂有五種種姓差別佛智於無邊際衆生界姓悉能了知遍計等利說名勝處中鈍下說名劣眼等互生皆了達種智無礙說名力此別釋根勝劣智力也根具說有二十二根謂眼等六根男根女根命根苦等五受根信等五根未知當知根已知根具知根也根有利中鈍三等利者名勝中鈍名劣二十二根攝一切雜染清淨之根衆生之根若勝若劣佛悉了知有行趣佛有行趣獨覺聲聞二菩提天人鬼畜地獄等智無障礙說為力此別釋遍趣行智力也趣謂趣向行謂所行之道或修大乘行趣佛道或修二乘獨覺聲聞道或修五戒十善人天道或作十惡五逆而趣三塗惡道佛悉了知無礙無邊世界行者別靜慮解脫奢摩他及九等至諸差別智無障礙說名力此別釋靜慮解脫等持等至智力也行者謂修禪定者所有修諸禪定之因及方便各各行者所修佛悉了知過去從癡住三有自他一一有情生盡情無邊並因處彼彼智慧說名力此別釋宿命智力也癡謂無明從無始來由無明流轉生死自他一一有情族姓壽命受用眷屬作業無邊有情過去所經皆悉了知盡虛空際世界中一一有情死生時於彼多境智遍轉清淨無礙說名力此別釋死生智力也此即天眼通能知未來多生之事盡未來際諸佛一切種智力速斷煩惱及習氣弟子等慧滅煩惱於彼無礙智名力此別釋漏盡智力也能斷煩惱得解脫亦能知已斷煩惱得解脫名漏盡智力小乘能斷煩惱而不能斷習氣且只能自知漏盡不知他人漏盡大乘斷煩惱習氣亦斷且能知他人何處何時以何因緣而得漏盡智無障礙妙翅飛還非空盡由自力盡而回轉佛德無邊若虛空弟子菩薩莫能宣如我於佛衆功德豈能了知而讚言然由龍猛已宣說故我無疑述少分上以十力總讚佛功德已此二頌佛之功德無窮讚莫能盡佛從初發心即為利益無邊衆生三大阿僧祇劫積集無邊福智資糧乃至十地得無邊佛妙智灌頂之三摩地如是功德廣大猶如虛空無有邊際不唯諸菩薩不能宣說即佛自宣說盡未來際亦不能盡如大鵬鳥破空飛去有時飛還乃力盡而還非已到虛空邊際而折還也如是諸佛菩薩說佛功德雖有時止息亦非佛之功德有盡我者月稱菩薩自稱如我有漏凡夫佛之功德非我境界豈能了知實無由讚揚然由龍樹菩薩所造寶鬘論法界讚等略窺少分故敢稱述也甚深謂空性餘德即廣大了知深廣理當得此功德此結出佛功德也佛之功德謂由福智二種資糧圓滿成就智謂通達甚深空性之慧福謂除慧以外其餘一切廣大功德從修布施等因乃至成就十力等果皆攝於此此甚深廣大二種般若即是大乘若能了知修證即可成就如佛之功德佛得不動身化重來三有示天降出胎菩提轉靜輪世有種種行為多愛索縛佛以大悲心咸導至涅槃此頌化身功德也此二頌藏文原是一頌以文多句長今譯為二頌不動身謂法身及報身以色界天身一般衆生無由接近故重現化身重來三有示現從兜率陀天下降王宮入胎出胎中間學習書數逾城出家雪山苦行示同凡夫及諸外道後更棄捨苦行受牧女乳糜浴尼連河於菩提樹下成等正覺轉大法輪所以示同凡夫者令衆生知佛與常人無異自信亦可成佛故示同外道者令知無義苦行不能解脫生死故靜輪者謂此法輪能息衆生煩惱最寂靜故世間衆生以有貪嗔等種種煩惱為貪五欲等不求勝果如被繩索結縛不得出離佛以大悲示受生死欲導彼等咸至涅槃也離知真實義餘無除衆垢諸法真實義無變異差別此證真實慧亦非有別異故佛為衆說無等無別乘此顯佛唯說一乘法也離知真實義無餘方便能除煩惱衆垢故除顯真實義外無別佛法然諸法真實義唯是一味不以異時異地而有變異差別由所證義無別故能證之慧亦無差別故佛說法究竟唯有一乘說三乘者是方便說如法華藥草化城窮子等喻所顯衆生有五濁能生諸過失故世間不入甚深佛行境然由佛善逝具智悲方便昔曾發誓願度盡諸有情此顯大悲不捨衆生故方便說法也衆生由劫濁見濁煩惱濁衆生濁命濁之所染污謗法造罪墮落顛倒故不能信解悟入甚深真義佛所行境然佛由昔發衆生無邊誓願度之宏願不能以衆生不解遂方便棄捨衆生故仍各應根機方便說法也以是如智者導衆赴寶洲為除衆疲乏化作可愛城佛令諸弟子念趣寂滅樂心修遠離已次乃說一乘此即引法華化城喻也十方世界佛行境如其所有微塵數佛證菩提劫亦爾然此祕密未嘗說直至虛空未變壞世間未證最寂滅慧母所生悲乳育佛豈入於寂滅處此二頌顯佛身不滅也初頌示釋迦牟尼無量劫前久已成佛十方世界佛所行境世界之數已不可知況於將此無邊世界碎為微塵之數佛證菩提以來所經劫數亦復如是然此祕密未嘗宣說唯於寶積經中父子相見會中有懷疑佛之國土何故如此穢惡不淨佛言過去無數劫有因陀羅王佛國土一切莊嚴勝於極樂世界最後謂彼佛為誰衆莫能答時文殊菩薩從東方不動世界佛會中一彈指頃從彼處沒於此間出謂彼佛即釋迦世尊故佛成佛之時距今若干時劫實非凡夫能測而自今以後盡未來際虛空界盡衆生界盡佛之悲願乃盡若衆生一人未證最寂滅果佛亦不入涅槃以佛為慧母所生大悲乳母之所育決不棄有情趣寂滅也世間由癡啖毒食如佛哀愍彼衆生子毒母痛亦不及以是勝依不入滅此喻顯大悲之痛切也如幼子無知食毒慈母所有痛苦憂惱佛見衆生由無明癡覆啖五欲毒食哀愍痛切猶有過之故衆生無明未盡佛決不忍入涅槃勝依者謂佛為衆生最勝依怙也由諸不智人執有事無事當受生死位愛離怨會苦並得罪惡趣故世成悲境大悲遮心滅故佛不涅槃此二頌顯大悲不入滅之理此在藏文亦是一頌每句各十五字世間衆生由無知故於緣生法執為實有墮在常邊於因果等撥為斷無墮在斷邊由墮常故流轉生死受一切苦由墮斷故造諸罪業入於惡趣故一切世間無非佛所悲念之境由大悲力所遮止故佛心無由入於寂滅故不涅槃也結義月稱勝苾芻廣集中論義如聖教教授宣說此論義如離於本論餘論無此法智者定當知此義非餘有此總結造論所依也謂我今造此論依於中論然非唯依文句乃依義理且依寶積華嚴法華等聖教及師長教授乃造此論其所詮之義謂由大悲心無二慧乃至十力佛果皆是也本論指中論餘論指唯識宗以下之論此一頌正對清辨派而言彼謂經部勝義有即是中觀世俗諦故此云除中論以外餘唯識以下諸宗無此真空之法故智者當知此空宗教義非餘部所有也由怖龍猛慧海色衆生棄此賢善宗開彼頌蕾拘摩陀望月稱者心願滿此顯造論所為也龍猛空慧如海甚深海深則蔚藍之色亦深衆生見而生怖衆生不達龍猛空慧甚深之境亦見而生布遂棄此中觀賢善之宗彼頌指中論頌拘摩陀花名色白入夜始開中論喻如花蕾此入中論喻如明月月出則拘摩陀開也我今開演中論之義為於望我開顯者令其願滿也前說深可怖多聞亦難解唯諸宿習者乃能善通達由見臆造宗如說有我教故離此宗外莫樂他宗論此顯此宗教義甚深唯具宿根乃能通達也此在藏文亦為一頌前說空理甚深可怖雖多聞如世親陳那亦難了解世親陳那是否真不解另一問題唯諸宿習般若具善根者方能通達見諸宗臆造之說不遵佛說其所說之義與外道所執有我之教相似故捨此宗外於他宗皆不愛樂也我釋龍猛宗獲福遍十方惑染意藍空皎潔若秋星或如心蛇頂所有摩尼珠願普世有情證真速成佛此總結回向也謂自身雖是凡夫意為衆惑所染如虛空黝暗藍色此福雖微如星光細小然亦為衆生之所瞻望又此心雖為三毒所集有如毒蛇然此造論福亦可利益衆生如毒蛇頂之摩尼珠亦為衆生所寶也今以釋龍猛論之福回施有情普願衆生速證真實速成佛果全文完
